services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: platform-prefect-vault-agent${ENV_SUFFIX}
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV}
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          # local checks every cycle (fast): secrets rendered + no unresolved template.
          test -s /vault/secrets/.env && ! grep -q "<no value>" /vault/secrets/.env && test -s /vault/.token || exit 1
          # vault token lookup THROTTLED to ~5min (token TTL is hours) so N vault-agents
          # do not hammer Vault every 30s (#292). The local checks above still fail fast.
          if [ -z "$$(find /tmp/.vault_hc -mmin -5 2>/dev/null)" ]; then
            wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null || exit 1
            touch /tmp/.vault_hc
          fi
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prefect-server:
    # Pinned by digest (prefect 3.7.4 / prefect-redis 0.2.11). The :3-latest tag
    # had drifted: the host cached a Jan-2026 image with prefect-redis 0.2.8,
    # whose Redis-messaging consumer leaked ephemeral consumer groups and
    # busy-polled while idle. 0.2.11 ships the ephemeral-group cleanup + batch
    # ack. Pinning the digest stops the tag from silently going stale again.
    image: prefecthq/prefect:3-latest@sha256:c10cc349f947da083a1cfb36c031f85806befe67a285a8e54a753226ddd505ec
    container_name: platform-prefect-server${ENV_SUFFIX}
    restart: unless-stopped
    # ops.standards §5 resource governance: ceiling with headroom over observed
    # ~3G; staging/preview deploys override these lower via env.
    mem_limit: ${PREFECT_SERVER_MEM_LIMIT:-4g}
    cpu_shares: ${TIER_CPU_SHARES:-1024}
    depends_on:
      vault-agent:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        MAX_WAIT=60; WAITED=0
        while [ ! -f /secrets/.env ] && [ $$WAITED -lt $$MAX_WAIT ]; do
          echo "Waiting for secrets... ($$WAITED/$$MAX_WAIT)"
          sleep 2
          WAITED=$$((WAITED+2))
        done
        [ -f /secrets/.env ] || { echo "FATAL: Secrets timeout after $${MAX_WAIT}s. Check vault-agent logs."; exit 1; }
        set -a
        . /secrets/.env
        set +a
        # Construct DATABASE_URL with password from secrets
        export PREFECT_API_DATABASE_CONNECTION_URL="postgresql+asyncpg://postgres:$${POSTGRES_PASSWORD}@platform-postgres${ENV_SUFFIX}:5432/prefect"
        export PREFECT_REDIS_MESSAGING_PASSWORD="$${REDIS_PASSWORD}"
        exec prefect server start --no-services
    environment:
      ENV_SUFFIX: ${ENV_SUFFIX}
      PREFECT_SERVER_API_HOST: 0.0.0.0
      # Redis messaging
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: platform-redis${ENV_SUFFIX}
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 1
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
      # SSO-protected access via Authentik forward auth
      # Env-scoped router/service/middleware names + host so staging and
      # production do not collide on the same Traefik route, and so staging's
      # forward-auth targets the staging Authentik (not prod). Matches the
      # platform/21.portal pattern. ${ENV_DOMAIN_SUFFIX} is empty in production
      # (URL unchanged) and "-staging" elsewhere.
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.rule=Host(`prefect${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.entrypoints=websecure"
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.tls=true"
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.service=prefect${ENV_DOMAIN_SUFFIX}"
      - "traefik.http.services.prefect${ENV_DOMAIN_SUFFIX}.loadbalancer.server.port=4200"
      # Authentik forward auth middleware (env-scoped name + target)
      - "traefik.http.middlewares.prefect-auth${ENV_DOMAIN_SUFFIX}.forwardauth.address=http://platform-authentik-server${ENV_SUFFIX}:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.prefect-auth${ENV_DOMAIN_SUFFIX}.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.prefect-auth${ENV_DOMAIN_SUFFIX}.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
      - "traefik.http.routers.prefect${ENV_DOMAIN_SUFFIX}.middlewares=prefect-auth${ENV_DOMAIN_SUFFIX}@docker"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u, sys; sys.exit(0 if u.urlopen('http://localhost:4200/api/health', timeout=1).read().strip() == b'true' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prefect-services:
    # Pinned by digest (prefect 3.7.4 / prefect-redis 0.2.11). The :3-latest tag
    # had drifted: the host cached a Jan-2026 image with prefect-redis 0.2.8,
    # whose Redis-messaging consumer leaked ephemeral consumer groups and
    # busy-polled while idle. 0.2.11 ships the ephemeral-group cleanup + batch
    # ack. Pinning the digest stops the tag from silently going stale again.
    image: prefecthq/prefect:3-latest@sha256:c10cc349f947da083a1cfb36c031f85806befe67a285a8e54a753226ddd505ec
    container_name: platform-prefect-services${ENV_SUFFIX}
    restart: unless-stopped
    mem_limit: ${PREFECT_SERVICES_MEM_LIMIT:-1g}
    cpu_shares: ${TIER_CPU_SHARES:-1024}
    depends_on:
      prefect-server:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file
        MAX_WAIT=60; WAITED=0
        while [ ! -f /secrets/.env ] && [ $$WAITED -lt $$MAX_WAIT ]; do
          echo "Waiting for secrets... ($$WAITED/$$MAX_WAIT)"
          sleep 2
          WAITED=$$((WAITED+2))
        done
        [ -f /secrets/.env ] || { echo "FATAL: Secrets timeout after $${MAX_WAIT}s. Check vault-agent logs."; exit 1; }
        set -a
        . /secrets/.env
        set +a
        # Construct DATABASE_URL with password from secrets
        export PREFECT_API_DATABASE_CONNECTION_URL="postgresql+asyncpg://postgres:$${POSTGRES_PASSWORD}@platform-postgres${ENV_SUFFIX}:5432/prefect"
        export PREFECT_REDIS_MESSAGING_PASSWORD="$${REDIS_PASSWORD}"
        exec prefect server services start
    environment:
      ENV_SUFFIX: ${ENV_SUFFIX}
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: platform-redis${ENV_SUFFIX}
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 1
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prefect-worker:
    # Pinned by digest (prefect 3.7.4 / prefect-redis 0.2.11). The :3-latest tag
    # had drifted: the host cached a Jan-2026 image with prefect-redis 0.2.8,
    # whose Redis-messaging consumer leaked ephemeral consumer groups and
    # busy-polled while idle. 0.2.11 ships the ephemeral-group cleanup + batch
    # ack. Pinning the digest stops the tag from silently going stale again.
    image: prefecthq/prefect:3-latest@sha256:c10cc349f947da083a1cfb36c031f85806befe67a285a8e54a753226ddd505ec
    container_name: platform-prefect-worker${ENV_SUFFIX}
    restart: on-failure
    mem_limit: ${PREFECT_WORKER_MEM_LIMIT:-1g}
    cpu_shares: ${TIER_CPU_SHARES:-1024}
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://platform-prefect-server${ENV_SUFFIX}:4200/api
    command: prefect worker start --pool default
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
