# OpenPanel — product analytics (self-hosted, upstream lindesvard/openpanel:2).
#
# Image contract (validated against upstream self-hosting compose + a live deploy):
#   - op-api listens on :3000 and MUST run DB migrations (`pnpm migrate:deploy`)
#     before `pnpm start`; skipping migrations leaves an empty schema.
#   - Secrets are consumed as process env (DATABASE_URL, DATABASE_URL_DIRECT,
#     REDIS_URL, COOKIE_SECRET, RESEND_API_KEY); non-secrets via `environment:`.
#   - Traefik strips /api -> op-api:3000, everything else -> op-dashboard:3000,
#     mirroring upstream's Caddy `handle_path /api*` routing.
#
# Dedicated ClickHouse (op-ch): the shared platform-clickhouse is pinned to 25.5
# by SigNoz (its owner — SigNoz v0.128 still ships 25.5.6), but OpenPanel v2
# targets ClickHouse 25.10 (DateTime64 TTL + newer query settings) and fails on
# 25.5. The two requirements are mutually exclusive, so OpenPanel runs its own
# version-matched ClickHouse. This intentionally overrides the original
# "zero-redundant ClickHouse" decision; see docs/ssot/platform.openpanel.md.
services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: platform-openpanel-vault-agent${ENV_SUFFIX}
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV}
      # Required by secrets.ctmpl to render environment-suffixed dependency hostnames
      ENV_SUFFIX: ${ENV_SUFFIX:-}
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          # vault token lookup
          test -s /vault/secrets/.env &&
          ! grep -q "<no value>" /vault/secrets/.env &&
          wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Dedicated ClickHouse, version-matched to OpenPanel v2 (see header note).
  op-ch:
    image: clickhouse/clickhouse-server:25.10.2.65
    container_name: platform-openpanel-ch${ENV_SUFFIX}
    restart: unless-stopped
    # cgroup hard cap on the shared, swapless 8-core host. Sits ABOVE ClickHouse's
    # own max_server_memory_usage (2 GiB, in clickhouse-config.xml) so CH rejects an
    # oversized query/merge before the kernel OOM-kills the container (or a neighbor).
    mem_limit: 2560m
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      # Durable host bind mount (uid 101 = clickhouse), matching platform/03.clickhouse.
      # A Dokploy-managed named volume is recreated with a new hash on redeploy and
      # silently wipes the event schema; the bind mount survives redeploys.
      - ${DATA_PATH}/op-ch:/var/lib/clickhouse
      - ./clickhouse/clickhouse-config.xml:/etc/clickhouse-server/config.d/op-config.xml:ro
      - ./clickhouse/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/op-user-config.xml:ro
      - ./clickhouse/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - dokploy-network
    healthcheck:
      # Write-path check, not `SELECT 1`: a read-only ping stays green even when the
      # data dir is unwritable (the uid-ownership regression), so ClickHouse can no
      # longer ingest while looking healthy. Exercise a real part-write so an unwritable
      # op-ch goes UNHEALTHY (Dokploy restarts it) and a deploy that breaks writability
      # never reaches healthy — making the dependent `service_healthy` gate the deploy
      # gate. Tiny TTL'd table keeps it cheap (~0.3s).
      test:
        - CMD-SHELL
        - "clickhouse-client -n -q 'CREATE TABLE IF NOT EXISTS default.__hc (t DateTime)
          ENGINE=MergeTree ORDER BY t TTL t + INTERVAL 10 MINUTE; INSERT INTO
          default.__hc VALUES (now()); SELECT 1 FROM default.__hc LIMIT 1'"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  op-api:
    # Pinned by digest (was floating `:2`, a moving major tag that drifts upstream).
    # Bump deliberately: `docker buildx imagetools inspect lindesvard/openpanel-api:2 | grep -m1 ^Digest`.
    image: lindesvard/openpanel-api:2@sha256:9353647f96dcfcceecd0ba2efd4c05e77ace3ea3f5d56b2cef55c1c3b550be7c
    container_name: platform-openpanel-api${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      vault-agent:
        condition: service_healthy
      op-ch:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        MAX_WAIT=60; WAITED=0
        while [ ! -f /secrets/.env ] && [ $$WAITED -lt $$MAX_WAIT ]; do
          echo "Waiting for secrets... ($$WAITED/$$MAX_WAIT)"
          sleep 2
          WAITED=$$((WAITED+2))
        done
        [ -f /secrets/.env ] || { echo "FATAL: Secrets timeout after $${MAX_WAIT}s. Check vault-agent logs."; exit 1; }
        set -a
        . /secrets/.env
        set +a

        # Wait for shared postgres to be ready (fail fast after max attempts)
        node -e "const net = require('net'); const max = 60; let n = 0; const check = () => { if (n++ >= max) { console.error('FATAL: postgres unreachable after ' + max + 's'); process.exit(1); } const s = net.createConnection(5432, 'platform-postgres${ENV_SUFFIX}').on('connect', () => { s.destroy(); process.exit(0); }).on('error', () => { console.log('Waiting for postgres... (' + n + '/' + max + ')'); setTimeout(check, 1000); }); }; check();"

        # Apply DB migrations (Postgres via Prisma + ClickHouse), then start the API
        echo 'Running migrations...'
        CI=true pnpm -r run migrate:deploy
        exec pnpm start
    environment: &op-env
      NODE_ENV: production
      SELF_HOSTED: "true"
      NEXT_PUBLIC_SELF_HOSTED: "true"
      BATCH_SIZE: "5000"
      BATCH_INTERVAL: "10000"
      ALLOW_REGISTRATION: "false"
      ALLOW_INVITATION: "true"
      # Use the env-suffixed container name, NOT the bare `op-ch` compose service
      # alias: on the shared external dokploy-network the `op-ch` alias is claimed
      # by BOTH prod and staging op-ch, so it resolves to two IPs and prod writes
      # can land on staging's ClickHouse. The container_name is unique per env.
      CLICKHOUSE_URL: http://platform-openpanel-ch${ENV_SUFFIX}:8123/openpanel
      DASHBOARD_URL: https://openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}
      API_URL: https://openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}/api
      NEXT_PUBLIC_DASHBOARD_URL: https://openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}
      NEXT_PUBLIC_API_URL: https://openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}/api
      EMAIL_SENDER: ""
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.rule=Host(`openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.entrypoints=websecure"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.tls=true"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.priority=20"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.service=openpanel-api${ENV_DOMAIN_SUFFIX}"
      - "traefik.http.services.openpanel-api${ENV_DOMAIN_SUFFIX}.loadbalancer.server.port=3000"
      # Strip /api prefix before forwarding to op-api:3000
      - "traefik.http.middlewares.openpanel-api-strip${ENV_DOMAIN_SUFFIX}.stripprefix.prefixes=/api"
      - "traefik.http.routers.openpanel-api${ENV_DOMAIN_SUFFIX}.middlewares=openpanel-api-strip${ENV_DOMAIN_SUFFIX}@docker"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  op-dashboard:
    image: lindesvard/openpanel-dashboard:2@sha256:f6934fb35dabba990ca9e73253179494d2e0247fc4b96c8202adbbaa0f06833c
    container_name: platform-openpanel-dashboard${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      op-api:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        MAX_WAIT=60; WAITED=0
        while [ ! -f /secrets/.env ] && [ $$WAITED -lt $$MAX_WAIT ]; do
          echo "Waiting for secrets... ($$WAITED/$$MAX_WAIT)"
          sleep 2
          WAITED=$$((WAITED+2))
        done
        [ -f /secrets/.env ] || { echo "FATAL: Secrets timeout after $${MAX_WAIT}s. Check vault-agent logs."; exit 1; }
        set -a
        . /secrets/.env
        set +a
        exec node .output/server/index.mjs
    environment: *op-env
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.rule=Host(`openpanel${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.entrypoints=websecure"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.tls=true"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.priority=10"
      - "traefik.http.routers.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.service=openpanel-dashboard${ENV_DOMAIN_SUFFIX}"
      - "traefik.http.services.openpanel-dashboard${ENV_DOMAIN_SUFFIX}.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  op-worker:
    image: lindesvard/openpanel-worker:2@sha256:3f996a4f819a84a6ea90272a992fc025c4ad52d70b7612d65d666fafb2f83668
    container_name: platform-openpanel-worker${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      op-api:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        MAX_WAIT=60; WAITED=0
        while [ ! -f /secrets/.env ] && [ $$WAITED -lt $$MAX_WAIT ]; do
          echo "Waiting for secrets... ($$WAITED/$$MAX_WAIT)"
          sleep 2
          WAITED=$$((WAITED+2))
        done
        [ -f /secrets/.env ] || { echo "FATAL: Secrets timeout after $${MAX_WAIT}s. Check vault-agent logs."; exit 1; }
        set -a
        . /secrets/.env
        set +a
        exec node dist/index.js
    environment: *op-env
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
