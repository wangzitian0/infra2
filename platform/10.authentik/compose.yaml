services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: platform-authentik-vault-agent${ENV_SUFFIX}
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV}
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          # local checks every cycle (fast): secrets rendered + no unresolved template.
          test -s /vault/secrets/.env && ! grep -q "<no value>" /vault/secrets/.env && test -s /vault/.token || exit 1
          # vault token lookup THROTTLED to ~5min (token TTL is hours) so N vault-agents
          # do not hammer Vault every 30s (#292). The local checks above still fail fast.
          if [ -z "$$(find /tmp/.vault_hc -mmin -5 2>/dev/null)" ]; then
            wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null || exit 1
            touch /tmp/.vault_hc
          fi
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-server${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        while [ ! -f /secrets/.env ]; do
          echo "Waiting for secrets..."
          sleep 1
        done
        set -a
        . /secrets/.env
        set +a
        exec ak server
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - secrets:/secrets:ro
      - ${DATA_PATH}/media:/media
      - ${DATA_PATH}/certs:/certs
      - ${DATA_PATH}/custom-templates:/templates
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
    healthcheck:
      test: [ "CMD", "ak", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-worker${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        while [ ! -f /secrets/.env ]; do
          echo "Waiting for secrets..."
          sleep 1
        done
        set -a
        . /secrets/.env
        set +a
        exec ak worker
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - secrets:/secrets:ro
      - ${DATA_PATH}/media:/media
      - ${DATA_PATH}/custom-templates:/templates
      - ${DATA_PATH}/certs:/certs
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: [ "CMD", "ak", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-time token initialization
  token-init:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-token-init${ENV_SUFFIX}
    restart: "no"
    depends_on:
      server:
        condition: service_healthy
      worker:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -a
        . /secrets/.env
        set +a
        /init-token.sh
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      VAULT_INIT_TOKEN: ${VAULT_INIT_TOKEN:-}
      VAULT_INIT_ADDR: ${VAULT_ADDR}
      ENV: ${ENV}
    volumes:
      - secrets:/secrets:ro
      - ./init-token.sh:/init-token.sh:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
