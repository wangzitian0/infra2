services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: platform-authentik-vault-agent${ENV_SUFFIX}
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /home/vault/.vault-token 2>/dev/null || true
        if [ -z "$$VAULT_APP_TOKEN" ]; then
          echo "VAULT_APP_TOKEN is required"
          exit 1
        fi
        echo "$$VAULT_APP_TOKEN" > /vault/token
        # token_file auth does not renew; keep the periodic token alive in-band
        # (renew-self every 6h). Requires renew-self capability in the token policy.
        ( while true; do sleep 21600; VAULT_TOKEN="$$(cat /vault/token)" vault write -f auth/token/renew-self >/dev/null 2>&1 || true; done ) &
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_APP_TOKEN: ${VAULT_APP_TOKEN:-}
      ENV: ${ENV}
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          # vault token lookup
          test -s /vault/secrets/.env &&
          ! grep -q "<no value>" /vault/secrets/.env &&
          wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-server${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        while [ ! -f /secrets/.env ]; do
          echo "Waiting for secrets..."
          sleep 1
        done
        set -a
        . /secrets/.env
        set +a
        exec ak server
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - secrets:/secrets:ro
      - ${DATA_PATH}/media:/media
      - ${DATA_PATH}/certs:/certs
      - ${DATA_PATH}/custom-templates:/templates
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
    healthcheck:
      test: [ "CMD", "ak", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-worker${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        # Wait for secrets file to be rendered by vault-agent
        while [ ! -f /secrets/.env ]; do
          echo "Waiting for secrets..."
          sleep 1
        done
        set -a
        . /secrets/.env
        set +a
        exec ak worker
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - secrets:/secrets:ro
      - ${DATA_PATH}/media:/media
      - ${DATA_PATH}/custom-templates:/templates
      - ${DATA_PATH}/certs:/certs
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: [ "CMD", "ak", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-time token initialization
  token-init:
    image: ghcr.io/goauthentik/server:2024.12.0
    container_name: platform-authentik-token-init${ENV_SUFFIX}
    restart: "no"
    depends_on:
      server:
        condition: service_healthy
      worker:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -a
        . /secrets/.env
        set +a
        /init-token.sh
    environment:
      AUTHENTIK_REDIS__HOST: platform-redis${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__HOST: platform-postgres${ENV_SUFFIX}
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      VAULT_INIT_TOKEN: ${VAULT_INIT_TOKEN:-}
      VAULT_INIT_ADDR: ${VAULT_ADDR}
      ENV: ${ENV}
    volumes:
      - secrets:/secrets:ro
      - ./init-token.sh:/init-token.sh:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
