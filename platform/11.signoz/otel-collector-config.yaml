receivers:
  otlp:
    protocols:
      # gRPC (4317): INTERNAL backend ingest only — reached via the Docker network
      # (platform-signoz-otel-collector:4317). NOT publicly exposed; left unchanged.
      grpc:
        endpoint: 0.0.0.0:4317
      # HTTP (4318): used by the internal backend AND, via the public Dokploy-managed
      # ingest domain otel.zitian.party, by the browser frontend (Infra-014).
      # The browser sends cross-origin XHR/fetch with a preflight, so the receiver
      # MUST echo CORS for our known app origins (and localhost dev). There is NO
      # bearer token: a browser cannot keep a secret.
      # SECURITY POSTURE — be precise: CORS is NOT authentication. It only governs
      # which *browser* origins may read responses cross-origin; it does NOT stop a
      # non-browser client (curl/script) from POSTing OTLP straight to this endpoint.
      # This is therefore an intentionally *unauthenticated public ingest*; abuse is
      # bounded by the collector limits below (memory_limiter) and the edge rate-limit
      # TODO(Infra-014) below, NOT by access control. Keep the CORS list in sync with
      # the FE origins.
      # See platform/11.signoz/README.md and ops.observability.md.
      # TODO(Infra-014): add edge per-IP rate limiting (e.g. a Dokploy/Traefik
      # ratelimit middleware managed via Dokploy, NOT a hand-written compose label) to
      # cap burst abuse of the unauthenticated public ingest.
      http:
        endpoint: 0.0.0.0:4318
        cors:
          # #368: this list is NOT hand-maintained — it is RENDERED at deploy time
          # from the FE origins in libs/deploy_env_config.cors_allowed_origins so it
          # cannot drift from the actual app domains. The placeholder below is replaced
          # by SigNozDeployer._render_collector_config (see platform/11.signoz/deploy.py).
          # Effective list (prod/staging from EnvConfig + preview aliases + local dev):
          #   report / report-staging / report-branch-main / report-pr-* / report-commit-* / localhost:3000
          # Rendered as a YAML flow sequence so the raw template is itself valid YAML
          # (the placeholder is a scalar until _render_collector_config substitutes it).
          allowed_origins: ${OTEL_CORS_ALLOWED_ORIGINS}
          allowed_headers:
            - "*"
          max_age: 7200

processors:
  batch:
    send_batch_size: 10000
    timeout: 10s
  # Protect the collector from OOM under burst from the unauthenticated public ingest.
  # Soft-limits memory and starts refusing data before the process is killed; this is
  # the lightweight collector-side limit that, together with the CORS allowlist,
  # replaces the removed Traefik bearer/rate-limit guard.
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  # SigNoz-specific exporters. retry_on_failure + a disk-backed sending_queue
  # (file_storage extension) make a transient ClickHouse outage or a collector
  # restart RETAIN telemetry instead of dropping the in-flight batch — previously
  # the batch was memory-only and lost after the 10s timeout (#369 obs-hardening).
  clickhousetraces:
    datasource: tcp://platform-clickhouse${ENV_SUFFIX}:9000?database=signoz_traces
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
      storage: file_storage

  signozclickhousemetrics:
    dsn: tcp://platform-clickhouse${ENV_SUFFIX}:9000
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
      storage: file_storage

  clickhouselogsexporter:
    dsn: tcp://platform-clickhouse${ENV_SUFFIX}:9000
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
      storage: file_storage

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  # Disk-backed queue directory (bind-mounted from the host, owned by the collector
  # uid 10001) — persists the exporter sending_queue across collector restarts.
  file_storage:
    directory: /var/lib/otelcol/file_storage

service:
  extensions: [health_check, file_storage]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [signozclickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouselogsexporter]
