receivers:
  otlp:
    protocols:
      # gRPC (4317): INTERNAL backend ingest only — reached via the Docker network
      # (platform-signoz-otel-collector:4317). NOT publicly exposed; left unchanged.
      grpc:
        endpoint: 0.0.0.0:4317
      # HTTP (4318): used by the internal backend AND, via the public ingest domain
      # otel.zitian.party (Traefik), by the browser frontend (Infra-014).
      # The browser sends cross-origin XHR/fetch with a preflight, so the receiver
      # MUST echo CORS for our known app origins (and localhost dev). The static
      # Authorization bearer token + rate-limit that keep the public endpoint from
      # being open are enforced UPSTREAM at Traefik (headers/ratelimit middlewares;
      # see platform/11.signoz/README.md and ops.observability.md) so the collector
      # never has to trust the raw internet — Traefik only forwards already-checked,
      # same-allowlist requests. Keep this CORS list in sync with that allowlist.
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - https://report.zitian.party
            - https://report-staging.zitian.party
            # preview aliases: report-main / report-pr-<N> / report-commit-<sha7>
            - https://report-main.zitian.party
            - https://report-pr-*.zitian.party
            - https://report-commit-*.zitian.party
            - http://localhost:3000
          allowed_headers:
            - "*"
          max_age: 7200

processors:
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  # SigNoz-specific exporters
  clickhousetraces:
    datasource: tcp://platform-clickhouse${ENV_SUFFIX}:9000?database=signoz_traces

  signozclickhousemetrics:
    dsn: tcp://platform-clickhouse${ENV_SUFFIX}:9000

  clickhouselogsexporter:
    dsn: tcp://platform-clickhouse${ENV_SUFFIX}:9000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signozclickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouselogsexporter]
