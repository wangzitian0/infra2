services:
  schema-migrator:
    image: signoz/signoz-schema-migrator:v0.129.12
    container_name: platform-signoz-schema-migrator${ENV_SUFFIX}
    restart: "no"
    command: ["sync", "--dsn", "tcp://default@platform-clickhouse${ENV_SUFFIX}:9000"]
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  signoz:
    image: signoz/signoz:v0.105.1
    container_name: platform-signoz${ENV_SUFFIX}
    hostname: signoz${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      schema-migrator:
        condition: service_completed_successfully
    command:
      - --config=/root/config/prometheus.yml
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://default@platform-clickhouse${ENV_SUFFIX}:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-ci-placeholder-do-not-use-in-production}
      - SIGNOZ_WEB_SELFREGISTRATION_ENABLED=true
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone
      - DOT_METRICS_ENABLED=true
    volumes:
      - ./prometheus.yml:/root/config/prometheus.yml:ro
      - ${DATA_PATH}/data:/var/lib/signoz
    networks:
      dokploy-network:
        aliases:
          - signoz${ENV_SUFFIX}
          - signoz-query-service${ENV_SUFFIX}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Routing is Dokploy-managed (Infra-014 follow-up): the SigNoz Web UI domain
    # signoz.${INTERNAL_DOMAIN} → :8080 is registered by SigNozDeployer
    # (subdomain="signoz", service_port=8080, service_name="signoz") via the base
    # deployer flow. No hand-written Traefik router/service labels here — see
    # docs/ssot/platform.domain.md and libs/tests/test_domain_routing_policy.py.

  otel-collector:
    image: signoz/signoz-otel-collector:v0.129.12
    container_name: platform-signoz-otel-collector${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      signoz:
        condition: service_healthy
    command:
      - --config=/etc/otel-collector-config.yaml
      - --feature-gates=-pkg.translator.prometheus.NormalizeName
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-collector,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_COMPONENT=otel-collector
      - ENV_SUFFIX=${ENV_SUFFIX}
    volumes:
      - ${DATA_PATH}/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      # Disk-backed exporter sending_queue (#369): survives collector restarts so a
      # ClickHouse blip / collector redeploy retains in-flight telemetry. The host dir
      # is pre-created + chowned to the collector uid (10001) in SigNozDeployer.
      - ${DATA_PATH}/otel-queue:/var/lib/otelcol/file_storage
    expose:
      - "4317"
      - "4318"
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/13133' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Public browser-OTLP ingest for the finance_report frontend (Infra-014 follow-up).
    #
    # The collector stays Docker-network-only for backend gRPC/HTTP (4317/4318 are
    # `expose`d, never published). The ONLY public surface is the single ingest
    # domain otel.${INTERNAL_DOMAIN}, forwarded to :4318 (OTLP HTTP). Browsers cannot
    # reach the internal collector, so this is the one path FE spans take.
    # Architecture: ONE shared collector for every env (SigNoz is prod_only / no
    # ENV_SUFFIX); envs are split downstream by the deployment.environment resource
    # attribute, NOT by per-env routes.
    #
    # Routing is Dokploy-managed (no hand-written Traefik labels): SigNozDeployer
    # registers this second domain (otel.${INTERNAL_DOMAIN} → otel-collector:4318) via
    # an extra client.ensure_domains(..., service_name="otel-collector") call in
    # platform/11.signoz/deploy.py, per docs/ssot/platform.domain.md and
    # libs/tests/test_domain_routing_policy.py.
    #
    # There is NO bearer token: a browser cannot hold a secret, so a static token in
    # the page is not a credential. Public ingest is instead gated by the CORS
    # allowlist + collector limits in otel-collector-config.yaml (keep the allowlist in
    # sync with the FE origins). Edge per-IP rate limiting is a documented TODO there.

networks:
  dokploy-network:
    external: true
