services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: platform-alerting-vault-agent${ENV_SUFFIX}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV}
      IAC_CONFIG_HASH: ${IAC_CONFIG_HASH:-}
    healthcheck:
      test:
        - CMD-SHELL
        - |
          # local checks every cycle (fast): secrets rendered + no unresolved template.
          test -s /vault/secrets/.env && ! grep -q "<no value>" /vault/secrets/.env && test -s /vault/.token || exit 1
          # vault token lookup THROTTLED to ~5min (token TTL is hours) so N vault-agents
          # do not hammer Vault every 30s (#292). The local checks above still fail fast.
          if [ -z "$$(find /tmp/.vault_hc -mmin -5 2>/dev/null)" ]; then
            wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null || exit 1
            touch /tmp/.vault_hc
          fi
      interval: 30s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network

  feishu-alert-bridge:
    build:
      context: ../..
      dockerfile: platform/12.alerting/Dockerfile
    pull_policy: build
    image: platform-alerting-feishu-bridge:${IAC_CONFIG_HASH:-latest}
    container_name: platform-alerting${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        set -e
        waited=0
        max_wait="$${ALERTING_SECRETS_WAIT_SECONDS:-300}"
        while [ ! -s /secrets/.env ] && [ "$$waited" -lt "$$max_wait" ]; do
          echo "Waiting for alerting secrets file..."
          sleep 2
          waited=$$((waited + 2))
        done
        if [ ! -s /secrets/.env ]; then
          echo "ERROR: /secrets/.env is missing or empty"
          exit 1
        fi
        set -a
        . /secrets/.env
        set +a
        case "$${ALERT_DELIVERY_MODE:-feishu_webhook}" in
          feishu_webhook)
            if [ -z "$$FEISHU_WEBHOOK_URL" ]; then
              echo "ERROR: FEISHU_WEBHOOK_URL is required for feishu_webhook mode"
              exit 1
            fi
            ;;
          feishu_app)
            if [ -z "$$FEISHU_APP_ID" ] || [ -z "$$FEISHU_APP_SECRET" ] || [ -z "$$FEISHU_CHAT_ID" ]; then
              echo "ERROR: FEISHU_APP_ID, FEISHU_APP_SECRET, and FEISHU_CHAT_ID are required for feishu_app mode"
              exit 1
            fi
            ;;
          *)
            echo "ERROR: unsupported ALERT_DELIVERY_MODE=$$ALERT_DELIVERY_MODE"
            exit 1
            ;;
        esac
        exec python /app/app.py
    environment:
      PORT: "8080"
      IAC_CONFIG_HASH: ${IAC_CONFIG_HASH:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=false"

  infra-probe-runner:
    image: platform-alerting-feishu-bridge:${IAC_CONFIG_HASH:-latest}
    container_name: platform-alerting-probes${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - feishu-alert-bridge
    command: ["python", "/app/tools/infra_probe_runner.py", "--loop"]
    healthcheck:
      # The loop rewrites the state file every cycle; if it has not been touched within
      # ~2x the interval, the probe loop is hung/dead. The runner had NO healthcheck, so a
      # hung loop went undetected — a real false-negative (the "monitor is a black box"
      # root). Now a hung runner goes unhealthy -> Dokploy restarts it.
      test:
        - CMD-SHELL
        - "find /tmp/infra_probe_runner_state.json -mmin -2 | grep -q . || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s
    environment:
      ALERT_BRIDGE_URL: http://platform-alerting${ENV_SUFFIX}:8080/signoz/webhook
      ALERTING_ENV_FILE: /secrets/.env
      INFRA_PROBE_INTERVAL_SECONDS: ${INFRA_PROBE_INTERVAL_SECONDS:-60}
      INFRA_PROBE_FAILURE_THRESHOLD: ${INFRA_PROBE_FAILURE_THRESHOLD:-3}
      INFRA_PROBE_RECOVERY_THRESHOLD: ${INFRA_PROBE_RECOVERY_THRESHOLD:-2}
      INFRA_PROBE_RENOTIFY_SECONDS: ${INFRA_PROBE_RENOTIFY_SECONDS:-1800}
      INFRA_PROBE_STATE_FILE: /tmp/infra_probe_runner_state.json
      INFRA_PROBE_HEARTBEAT_URL: ${INFRA_PROBE_HEARTBEAT_URL:-}
      INFRA_PROBE_HEARTBEAT_TOKEN: ${INFRA_PROBE_HEARTBEAT_TOKEN:-}
      INFRA_PROBE_HEARTBEAT_ENV: ${ENV:-production}
      INFRA_PROBE_HEARTBEAT_NAME: platform-alerting-probes${ENV_SUFFIX}
      OBS_ROUNDTRIP_STATE_FILE: /tmp/observability_roundtrip_probe_state.json
      OBS_ROUNDTRIP_INTERVAL_SECONDS: ${OBS_ROUNDTRIP_INTERVAL_SECONDS:-300}
      OBS_ROUNDTRIP_QUERY_WAIT_SECONDS: ${OBS_ROUNDTRIP_QUERY_WAIT_SECONDS:-30}
      # Registry-rendered (#541): the probe set is DECLARED as ProbeFacet
      # attributes on each owning service's deploy.py Deployer class and
      # aggregated by libs/probe_specs.py::render_probe_spec_text() via
      # libs/service_registry.py::service_attrs(). AlertingDeployer.
      # compose_env_base() resolves ${ENV_SUFFIX} and injects the encoded
      # value into the Dokploy compose env — this reference is the ONLY probe
      # source here. The pre-migration literal is frozen field-by-field in
      # libs/tests/fixtures/infra_probe_specs_frozen.txt (permanent
      # equivalence regression, libs/tests/test_probe_specs_equivalence.py).
      INFRA_PROBE_SPECS: ${INFRA_PROBE_SPECS:-}
    volumes:
      - secrets:/secrets:ro
      # A dedicated empty host dir (Docker auto-creates it). statvfs reports usage
      # of the FILESYSTEM BACKING this dir — on this single-root-partition host
      # that is the host root (incl. /var/lib/docker, where a runaway writer fills
      # space). Mounting a dedicated dir instead of `/` avoids exposing host files
      # (SSH keys/configs). Read-only. If /var is split out on some host, point
      # this at a path on the filesystem you want to watch.
      - /var/lib/infra2-disk-probe:/hostfs:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=false"

  # Deploy-queue guard sidecar: observe deploys stuck `running` past the ceiling
  # via Dokploy's API and alert; opt-in remediation kills them through Dokploy's
  # own compose.killBuild/cancelDeployment/cleanQueues (never raw Redis).
  # Remediation is OFF by default — set DEPLOY_GUARD_REMEDIATE=1 to arm it.
  deploy-queue-guard:
    image: platform-alerting-feishu-bridge:${IAC_CONFIG_HASH:-latest}
    container_name: platform-alerting-deploy-guard${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - feishu-alert-bridge
    command: ["python", "/app/tools/deploy_queue_guard.py", "--loop"]
    environment:
      DOKPLOY_URL: ${DOKPLOY_URL:-http://dokploy:3000/api}
      ALERT_BRIDGE_URL: http://platform-alerting${ENV_SUFFIX}:8080/signoz/webhook
      ALERTING_ENV_FILE: /secrets/.env
      DEPLOY_GUARD_CEILING_SECONDS: ${DEPLOY_GUARD_CEILING_SECONDS:-1800}
      DEPLOY_GUARD_INTERVAL_SECONDS: ${DEPLOY_GUARD_INTERVAL_SECONDS:-60}
      DEPLOY_GUARD_REMEDIATE: ${DEPLOY_GUARD_REMEDIATE:-0}
      DEPLOY_GUARD_GRACE_SECONDS: ${DEPLOY_GUARD_GRACE_SECONDS:-20}
      DEPLOY_GUARD_RENOTIFY_SECONDS: ${DEPLOY_GUARD_RENOTIFY_SECONDS:-1800}
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=false"

  # Container-breakdown watch: alert when ANY container is crash-looping /
  # unhealthy, WITH the cause pulled from its logs (e.g. missing Vault creds).
  # The HTTP probes catch "service down"; this catches "down BECAUSE x" — the
  # signal that was missing during the finance_report Vault outage. Read-only
  # docker.sock to read container state + log tails; never writes/execs.
  container-breakdown-watch:
    image: platform-alerting-feishu-bridge:${IAC_CONFIG_HASH:-latest}
    container_name: platform-alerting-breakdown-watch${ENV_SUFFIX}
    restart: unless-stopped
    depends_on:
      - feishu-alert-bridge
    command: ["python", "/app/tools/container_breakdown_watch.py", "--loop"]
    environment:
      # prod-only singleton: the watcher reads the whole shared Docker engine, so only
      # the prod copy sweeps (non-prod copies no-op — see container_breakdown_watch.main).
      ENV: ${ENV:-production}
      ALERT_BRIDGE_URL: http://platform-alerting${ENV_SUFFIX}:8080/signoz/webhook
      ALERTING_ENV_FILE: /secrets/.env
      BREAKDOWN_INTERVAL_SECONDS: ${BREAKDOWN_INTERVAL_SECONDS:-60}
      BREAKDOWN_RENOTIFY_SECONDS: ${BREAKDOWN_RENOTIFY_SECONDS:-1800}
      # Flap hysteresis (#475): consecutive-poll thresholds before firing/resolving.
      # See tools/container_breakdown_watch.py's module docstring for the reasoning.
      BREAKDOWN_FAILURE_THRESHOLD: ${BREAKDOWN_FAILURE_THRESHOLD:-3}
      BREAKDOWN_RECOVERY_THRESHOLD: ${BREAKDOWN_RECOVERY_THRESHOLD:-5}
      BREAKDOWN_LOG_TAIL: ${BREAKDOWN_LOG_TAIL:-25}
    volumes:
      - secrets:/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      - "traefik.enable=false"

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
