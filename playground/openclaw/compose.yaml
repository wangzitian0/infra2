services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: always
    expose:
      - "18789"
    command: [ "node", "dist/index.js", "gateway", "--allow-unconfigured", "--bind", "${OPENCLAW_GATEWAY_BIND:-lan}", "--port", "${OPENCLAW_GATEWAY_PORT:-18789}" ]
    environment:
      - OPENCLAW_GATEWAY_TOKEN
      - OPENCLAW_GATEWAY_BIND
      - OPENCLAW_GATEWAY_PORT
      - GOG_KEYRING_PASSWORD
      - ZAI_API_KEY
      - XDG_CONFIG_HOME=/home/node/.openclaw
      - HOME=/home/node
      - NODE_ENV=production
      - PLUGIN_FEISHU_ENABLED
      - FEISHU_DOMAIN
      - FEISHU_APP_ID
      - FEISHU_APP_SECRET
      - FEISHU_VERIFICATION_TOKEN
      - FEISHU_ENCRYPT_KEY
    volumes:
      - ./data:/home/node/.openclaw
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  init-permissions:
    image: busybox
    command: chown -R 1000:1000 /data
    volumes:
      - ./data:/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
