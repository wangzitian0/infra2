    auth_method: approle
    compose_path: platform/12.alerting/compose.yaml
    vault_agent_config_path: platform/12.alerting/vault-agent.hcl
    secret_template_path: platform/12.alerting/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/alerting
    vault_agent_container: platform-alerting-vault-agent${ENV_SUFFIX}
    app_containers:
      - platform-alerting${ENV_SUFFIX}
  - id: platform/prefect
    project: platform
    dokploy_service: prefect
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/23.prefect/compose.yaml
    vault_agent_config_path: platform/23.prefect/vault-agent.hcl
    secret_template_path: platform/23.prefect/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/prefect
    vault_agent_container: platform-prefect-vault-agent${ENV_SUFFIX}
    app_containers:
