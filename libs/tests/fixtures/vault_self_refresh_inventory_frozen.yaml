    compose_path: truealpha/truealpha/preview/compose.yaml
    vault_agent_config_path: truealpha/truealpha/preview/vault-agent.hcl
    secret_template_path: truealpha/truealpha/preview/secrets.ctmpl
    vault_path_template: secret/data/truealpha/{env}/app
    vault_agent_container: truealpha-app-vault-agent${ENV_SUFFIX}
    app_containers:
      - truealpha-llm${ENV_SUFFIX}
      - truealpha-web${ENV_SUFFIX}
