    vault_agent_container: truealpha-app-vault-agent${ENV_SUFFIX}
    app_containers:
      - truealpha-llm${ENV_SUFFIX}
      - truealpha-web${ENV_SUFFIX}
  - id: truealpha/preview
    project: truealpha
    dokploy_service: app
    # #522: multi-alias ephemeral PREVIEW, generalized off finance_report/preview's
