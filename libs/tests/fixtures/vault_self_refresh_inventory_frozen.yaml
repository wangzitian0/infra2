version: 1
defaults:
  vault_token_env_key: VAULT_APP_TOKEN
  rendered_secret_path: /vault/secrets/.env
  app_secret_mount_path: /secrets/.env
  max_rendered_secret_age_seconds: 900
  min_token_ttl_hours: 48
services:
  - id: bootstrap/iac_runner
    project: bootstrap
    dokploy_service: iac_runner
    # Migrated to AppRole auth (#369, completing #257/#259): vault-agent uses
    # VAULT_ROLE_ID + VAULT_SECRET_ID (Dokploy-injected, NOT 1Password), and the
    # deploy credential is a per-deploy `auth/approle/login` (no static
    # VAULT_APP_TOKEN). Single bounded AppRole; P0 anti-cycle invariants preserved
    # — see docs/ssot/bootstrap.iac_runner.md §6.4.
    auth_method: approle
    compose_path: bootstrap/06.iac_runner/compose.yaml
    vault_agent_config_path: bootstrap/06.iac_runner/vault-agent.hcl
    secret_template_path: bootstrap/06.iac_runner/secrets.ctmpl
    vault_path_template: secret/data/bootstrap/{env}/iac_runner
    vault_agent_container: iac-runner-vault-agent
    app_containers:
      - iac-runner
  - id: platform/postgres
    project: platform
    dokploy_service: postgres
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/01.postgres/compose.yaml
    vault_agent_config_path: platform/01.postgres/vault-agent.hcl
    secret_template_path: platform/01.postgres/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/postgres
    vault_agent_container: platform-postgres-vault-agent${ENV_SUFFIX}
    app_containers:
      - platform-postgres${ENV_SUFFIX}
  - id: platform/redis
    project: platform
    dokploy_service: redis
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/02.redis/compose.yaml
    vault_agent_config_path: platform/02.redis/vault-agent.hcl
    secret_template_path: platform/02.redis/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/redis
    vault_agent_container: platform-redis-vault-agent${ENV_SUFFIX}
    app_containers:
      - platform-redis${ENV_SUFFIX}
  - id: platform/minio
    project: platform
    dokploy_service: minio
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/03.minio/compose.yaml
    vault_agent_config_path: platform/03.minio/vault-agent.hcl
    secret_template_path: platform/03.minio/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/minio
    vault_agent_container: platform-minio-vault-agent${ENV_SUFFIX}
    app_containers:
      - platform-minio${ENV_SUFFIX}
  - id: platform/authentik
    project: platform
    dokploy_service: authentik
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/10.authentik/compose.yaml
    vault_agent_config_path: platform/10.authentik/vault-agent.hcl
    secret_template_path: platform/10.authentik/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/authentik
    vault_agent_container: platform-authentik-vault-agent${ENV_SUFFIX}
    app_containers:
