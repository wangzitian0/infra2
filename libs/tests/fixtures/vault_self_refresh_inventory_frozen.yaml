  - id: platform/openpanel
    project: platform
    dokploy_service: openpanel
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: platform/24.openpanel/compose.yaml
    vault_agent_config_path: platform/24.openpanel/vault-agent.hcl
    secret_template_path: platform/24.openpanel/secrets.ctmpl
    vault_path_template: secret/data/platform/{env}/openpanel
    vault_agent_container: platform-openpanel-vault-agent${ENV_SUFFIX}
    app_containers:
      - platform-openpanel-api${ENV_SUFFIX}
      - platform-openpanel-dashboard${ENV_SUFFIX}
      - platform-openpanel-worker${ENV_SUFFIX}
  - id: finance_report/postgres
    project: finance_report
    dokploy_service: postgres
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: finance_report/finance_report/01.postgres/compose.yaml
    vault_agent_config_path: finance_report/finance_report/01.postgres/vault-agent.hcl
    secret_template_path: finance_report/finance_report/01.postgres/secrets.ctmpl
    vault_path_template: secret/data/finance_report/{env}/postgres
    vault_agent_container: finance_report-postgres-vault-agent${ENV_SUFFIX}
    app_containers:
      - finance_report-postgres${ENV_SUFFIX}
  - id: finance_report/redis
    project: finance_report
    dokploy_service: redis
    # Migrated to AppRole auth (#257/#259): vault-agent uses VAULT_ROLE_ID +
    # VAULT_SECRET_ID, not a static VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: finance_report/finance_report/02.redis/compose.yaml
    vault_agent_config_path: finance_report/finance_report/02.redis/vault-agent.hcl
    secret_template_path: finance_report/finance_report/02.redis/secrets.ctmpl
    vault_path_template: secret/data/finance_report/{env}/redis
    vault_agent_container: finance_report-redis-vault-agent${ENV_SUFFIX}
    app_containers:
      - finance_report-redis${ENV_SUFFIX}
  - id: finance_report/app
    project: finance_report
    dokploy_service: app
    # Pilot of the AppRole auth migration (#257/#259): the vault-agent
    # authenticates with VAULT_ROLE_ID + VAULT_SECRET_ID, not a static
    # VAULT_APP_TOKEN.
    auth_method: approle
    compose_path: finance_report/finance_report/10.app/compose.yaml
    vault_agent_config_path: finance_report/finance_report/10.app/vault-agent.hcl
    secret_template_path: finance_report/finance_report/10.app/secrets.ctmpl
    vault_path_template: secret/data/finance_report/{env}/app
    vault_agent_container: finance_report-app-vault-agent${ENV_SUFFIX}
    app_containers:
      - finance_report-backend${ENV_SUFFIX}
  - id: finance_report/preview
    project: finance_report
    dokploy_service: app
    # Multi-alias ephemeral PREVIEW (feat/preview-env-multi-alias). Same AppRole
    # auth as the app; the secrets template reads the SOURCE env's app secrets
    # (PREVIEW_SECRET_ENV, default staging) since an alias has no Vault path of
    # its own — hence the {env} here resolves to that source env, not the alias.
    auth_method: approle
    compose_path: finance_report/finance_report/preview/compose.yaml
    vault_agent_config_path: finance_report/finance_report/preview/vault-agent.hcl
    secret_template_path: finance_report/finance_report/preview/secrets.ctmpl
    vault_path_template: secret/data/finance_report/{env}/app
    vault_agent_container: finance_report-app-vault-agent${ENV_SUFFIX}
    app_containers:
      - finance_report-backend${ENV_SUFFIX}
  - id: truealpha/postgres
    project: truealpha
    dokploy_service: postgres
    # AppRole auth from day one (same model as finance_report post-#257/#259).
    auth_method: approle
    compose_path: truealpha/truealpha/01.postgres/compose.yaml
    vault_agent_config_path: truealpha/truealpha/01.postgres/vault-agent.hcl
    secret_template_path: truealpha/truealpha/01.postgres/secrets.ctmpl
    vault_path_template: secret/data/truealpha/{env}/postgres
    vault_agent_container: truealpha-postgres-vault-agent${ENV_SUFFIX}
