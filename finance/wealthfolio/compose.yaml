services:
  wealthfolio:
    image: afadil/wealthfolio:latest@sha256:6896f692f5a3b3d48a201f9f49dec506021e5c12b4a086a67099b08b136ca580
    container_name: finance-wealthfolio
    restart: always
    environment:
      - WF_LISTEN_ADDR=0.0.0.0:8088
      - WF_DB_PATH=/data/wealthfolio.db
      - WF_SECRET_KEY=${WF_SECRET_KEY}
      - WF_AUTH_PASSWORD_HASH=${WF_AUTH_PASSWORD_HASH}
      - WF_CORS_ALLOW_ORIGINS=https://wealth.${INTERNAL_DOMAIN}
    volumes:
      - /data/finance/wealthfolio:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8088/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
