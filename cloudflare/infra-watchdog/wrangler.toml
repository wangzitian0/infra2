name = "infra2-cloudflare-watchdog"
main = "worker.js"
compatibility_date = "2026-06-01"
account_id = "6e27b6853de0131bea033d235e0a1139"
workers_dev = true

# Persist console.log output as queryable Workers Logs (free-tier allocation),
# so watchdog/heartbeat failures are diagnosable after the fact instead of only
# via live `wrangler tail`.
[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["*/30 * * * *"]

[vars]
WATCHDOG_ENVIRONMENTS = "production,staging"
WATCHDOG_HTTP_TIMEOUT_MS = "8000"
WATCHDOG_RETRY_MAX_ATTEMPTS = "2"
WATCHDOG_RETRY_DELAY_MS = "60000"
WATCHDOG_RENOTIFY_SECONDS = "7200"
WATCHDOG_STATUS_MAX_AGE_SECONDS = "7200"
# Heartbeat KV writes are throttled to at most one per this interval per key.
# Worst-case daily puts = (heartbeat keys * ceil(86400/interval)) + cron lastRun
# and alert-state puts, which must stay well under the KV free-tier 1000/day.
WATCHDOG_HEARTBEAT_MIN_WRITE_INTERVAL_SECONDS = "900"
ALERT_DELIVERY_MODE = "feishu_app"
# Secondary alert channel (email via Resend): used only when Feishu delivery
# fails, so a Feishu outage cannot silently swallow an alert. RESEND_API_KEY is a
# wrangler secret. Sender domain must be verified in Resend.
ALERT_EMAIL_TO = "wangzitian.ai@gmail.com"
ALERT_EMAIL_FROM = "watchdog@mail.zitian.party"
WATCHDOG_TARGETS_JSON = """
[
  {"environment":"production","name":"dokploy-public-route","service_id":"bootstrap/dokploy","url":"https://cloud.zitian.party","statuses":[200,302],"severity":"critical"},
  {"environment":"production","name":"vault-public-route","service_id":"bootstrap/vault","url":"https://vault.zitian.party/v1/sys/health","statuses":[200,429,472,473],"severity":"critical"},
  {"environment":"production","name":"minio-public-route","service_id":"platform/minio","url":"https://minio.zitian.party/minio/health/live","statuses":[200],"severity":"warning"},
  {"environment":"production","name":"authentik-public-route","service_id":"platform/authentik","url":"https://sso.zitian.party/-/health/live/","statuses":[200,204,302],"severity":"critical"},
  {"environment":"production","name":"signoz-public-route","service_id":"platform/signoz","url":"https://signoz.zitian.party","statuses":[200,302],"severity":"critical"},
  {"environment":"staging","name":"minio-public-route","service_id":"platform/minio","url":"https://minio-staging.zitian.party/minio/health/live","statuses":[200],"severity":"warning"},
  {"environment":"staging","name":"authentik-public-route","service_id":"platform/authentik","url":"https://sso-staging.zitian.party/-/health/live/","statuses":[200,204,302],"severity":"warning"},
  {"environment":"production","name":"finance-report-web-public-route","service_id":"finance_report/app","url":"https://report.zitian.party/","statuses":[200,302,307,308],"severity":"critical"},
  {"environment":"production","name":"finance-report-api-public-route","service_id":"finance_report/app","url":"https://report.zitian.party/api/health","statuses":[200],"severity":"critical"},
  {"environment":"staging","name":"finance-report-web-public-route","service_id":"finance_report/app","url":"https://report-staging.zitian.party/","statuses":[200,302,307,308],"severity":"warning"},
  {"environment":"staging","name":"finance-report-api-public-route","service_id":"finance_report/app","url":"https://report-staging.zitian.party/api/health","statuses":[200],"severity":"warning"}
]
"""
WATCHDOG_HEARTBEATS_JSON = """
[
  {"environment":"production","name":"platform-alerting-probes","service_id":"platform/alerting","maxAgeSeconds":5400,"severity":"critical"},
  {"environment":"staging","name":"platform-alerting-probes-staging","service_id":"platform/alerting","maxAgeSeconds":5400,"severity":"warning"}
