name = "infra2-cloudflare-watchdog"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = true

[triggers]
crons = ["*/10 * * * *"]

[vars]
WATCHDOG_ENVIRONMENTS = "production,staging"
WATCHDOG_HTTP_TIMEOUT_MS = "8000"
WATCHDOG_RENOTIFY_SECONDS = "3600"

[[kv_namespaces]]
binding = "WATCHDOG_STATE"
id = "replace-with-watchdog-state-kv-namespace-id"
preview_id = "replace-with-watchdog-state-preview-kv-namespace-id"
