services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: iac-runner-vault-agent
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id /vault/token /home/vault/.vault-token 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew-self loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV:-production}
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network
    healthcheck:
      test:
        - CMD-SHELL
        - |
          # local checks every cycle (fast): secrets rendered + no unresolved template.
          test -s /vault/secrets/.env && ! grep -q "<no value>" /vault/secrets/.env && test -s /vault/.token || exit 1
          # vault token lookup THROTTLED to ~5min (token TTL is hours) so N vault-agents
          # do not hammer Vault every 30s (#292). The local checks above still fail fast.
          if [ -z "$$(find /tmp/.vault_hc -mmin -5 2>/dev/null)" ]; then
            wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null || exit 1
            touch /tmp/.vault_hc
          fi
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  iac-runner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-latest}
    # Always rebuild from source when deploying (no image caching)
    # This ensures webhook_server.py and other source files are always up-to-date
    pull_policy: build
    image: bootstrap-iac_runner-bkewyn-iac-runner:${GIT_SHA:-latest}
    container_name: iac-runner
    restart: unless-stopped
    depends_on:
      - vault-agent
    entrypoint:
      - sh
      - -c
      - |
        set -e
        
        echo "Waiting for secrets file..."
        timeout=60
        while [ ! -f /secrets/.env ] && [ $$timeout -gt 0 ]; do
          sleep 1
          timeout=$$((timeout - 1))
        done
        
        if [ ! -f /secrets/.env ]; then
          echo "ERROR: Secrets file not found after 60s"
          exit 1
        fi
        
        if [ ! -s /secrets/.env ]; then
          echo "ERROR: Secrets file is empty"
          exit 1
        fi
        
        set -a
        . /secrets/.env
        set +a
        
        if [ -z "$$WEBHOOK_SECRET" ]; then
          echo "ERROR: WEBHOOK_SECRET not set in secrets"
          exit 1
        fi
        
        if [ -z "$$GIT_REPO_URL" ]; then
          echo "ERROR: GIT_REPO_URL not set in secrets"
          exit 1
        fi
        
        echo "Secrets validated successfully"
        
        mkdir -p /root/.ssh /root/.ssh_runtime
        if [ -f /host_ssh/id_ed25519 ]; then
          cp /host_ssh/id_ed25519 /root/.ssh_runtime/id_ed25519
          chmod 600 /root/.ssh_runtime/id_ed25519
          if [ -f /host_ssh/id_ed25519.pub ]; then
            cp /host_ssh/id_ed25519.pub /root/.ssh_runtime/id_ed25519.pub
          fi
          cat > /root/.ssh/config <<EOF
        Host *
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            IdentityFile /root/.ssh_runtime/id_ed25519
            LogLevel ERROR
        EOF
          chmod 600 /root/.ssh/config
          echo "SSH key configured"
        else
          echo "WARNING: SSH key not found, remote operations may fail"
        fi
        
        echo "Starting gunicorn with 1 worker, 4 threads..."
        exec gunicorn -w 1 --threads 4 -b 0.0.0.0:8080 --timeout 120 webhook_server:app
    environment:
      - WEBHOOK_PORT=8080
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-}
      - INTERNAL_DOMAIN=${INTERNAL_DOMAIN}
      - VPS_HOST=${VPS_HOST:-}
      - ENV=${ENV:-production}
      - PROJECT=${PROJECT:-platform}
      - DEPLOY_TIMEOUT=${DEPLOY_TIMEOUT:-600}
      - BUILD_CACHE_BUST=v4
      - ALLOW_SHARED_DATA_PATH=${ALLOW_SHARED_DATA_PATH:-0}
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
    volumes:
      - secrets:/secrets:ro
      - ${DATA_PATH:-/data/bootstrap/iac-runner}/workspace:/workspace
      - ${SSH_DIR_PATH:-/root/.ssh}:/host_ssh:ro
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3


volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
