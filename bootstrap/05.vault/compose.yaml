services:
  vault:
    image: hashicorp/vault:1.15.4
    container_name: vault
    restart: always
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "https://vault.${INTERNAL_DOMAIN}"
      VAULT_LOCAL_CONFIG: |
        {
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": true
            }
          }],
          "storage": {
            "file": {
              "path": "/vault/file"
            }
          },
          "ui": true,
          "disable_mlock": true,
          "log_level": "info"
        }
    volumes:
      - /data/bootstrap/vault/file:/vault/file
      - /data/bootstrap/vault/logs:/vault/logs
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    cap_add:
      - IPC_LOCK
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
    command: server
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  unsealer:
    build: .
    image: bootstrap-vault-unsealer:python3.11
    container_name: vault-unsealer
    restart: always
    environment:
      VAULT_ADDR: "http://vault:8200"
      OP_CONNECT_HOST: "http://op-connect-api:8080"
      OP_CONNECT_TOKEN: "${OP_CONNECT_TOKEN}"
      OP_VAULT_ID: "${OP_VAULT_ID}"
      OP_ITEM_ID: "${OP_ITEM_ID}"
    depends_on:
      - vault
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "python", "unsealer.py", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  dokploy-network:
    external: true
