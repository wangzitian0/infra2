name: Platform Deployment

on:
  push:
    branches: ["main"]
    paths:
      - "bootstrap/06.iac_runner/**"
      - "platform/**"
      - "finance_report/**"
      - "finance/**"
      - "libs/**"
      - "scripts/deploy_iac_runner_bootstrap.sh"
      - ".github/workflows/deploy-platform.yml"
  workflow_dispatch:
    inputs:
      env:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git Reference (branch/tag)'
        required: true
        default: 'main'
      force_redeploy_all:
        description: 'Force redeploy all services (skip change detection)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: platform-deployment-${{ github.event_name == 'workflow_dispatch' && inputs.env || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.env || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Deployment Target
        id: target
        run: |
          set -euo pipefail

          # Default from inputs (workflow_dispatch)
          ENV="${{ inputs.env }}"
          REF="${{ inputs.ref }}"
          
          # Override if push event
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref }}" == refs/heads/main ]]; then
              ENV="staging"
              REF="main"
            fi
          fi
          
          FORCE_REDEPLOY_ALL="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FORCE_REDEPLOY_ALL="${{ inputs.force_redeploy_all }}"
          fi
          
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "force_redeploy_all=$FORCE_REDEPLOY_ALL" >> "$GITHUB_OUTPUT"
          
          echo "🚀 Deploying $REF to $ENV (force_redeploy_all=$FORCE_REDEPLOY_ALL)"

      - name: Resolve Deployment Commit
        id: deploy-ref
        run: |
          set -euo pipefail

          ENV="${{ steps.target.outputs.env }}"
          SOURCE_REF="${{ steps.target.outputs.ref }}"

          git fetch --tags --prune origin '+refs/heads/*:refs/remotes/origin/*'

          if [[ "${{ github.event_name }}" == "push" ]]; then
            DEPLOY_SHA="$GITHUB_SHA"
          elif [[ "$ENV" == "production" ]]; then
            if [[ ! "$SOURCE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Production deploys require a semver tag like v1.2.3."
              exit 1
            fi
            DEPLOY_SHA="$(git rev-parse "refs/tags/${SOURCE_REF}^{commit}")"
          elif [[ "$SOURCE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            DEPLOY_SHA="$(git rev-parse "${SOURCE_REF}^{commit}")"
          elif git rev-parse --verify --quiet "refs/remotes/origin/${SOURCE_REF}^{commit}" >/dev/null; then
            DEPLOY_SHA="$(git rev-parse "refs/remotes/origin/${SOURCE_REF}^{commit}")"
          elif git rev-parse --verify --quiet "refs/tags/${SOURCE_REF}^{commit}" >/dev/null; then
            DEPLOY_SHA="$(git rev-parse "refs/tags/${SOURCE_REF}^{commit}")"
          else
            echo "::error::Unable to resolve deployment ref: ${SOURCE_REF}"
            exit 1
          fi

          {
            echo "sha=$DEPLOY_SHA"
            echo "source_ref=$SOURCE_REF"
            echo "short_sha=${DEPLOY_SHA:0:12}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $SOURCE_REF to $DEPLOY_SHA for $ENV"

      - name: Detect IaC Runner bootstrap changes
        id: runner-changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          changed_file="$(mktemp)"
          changed_files="$(mktemp)"
          echo false > "$changed_file"

          before="${{ github.event.before }}"
          after="$GITHUB_SHA"
          if [[ "$before" =~ ^0+$ ]]; then
            files_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${after}"
            files_filter='.files[]?.filename'
          else
            files_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/compare/${before}...${after}"
            files_filter='.files[]?.filename'
          fi

          echo "IaC Runner bootstrap change detection:"
          echo "  before=$before"
          echo "  after=$after"
          echo "  files_url=$files_url"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$files_url" \
            | jq -r "$files_filter" \
            > "$changed_files"

          echo "::group::Changed files from GitHub API"
          if [[ -s "$changed_files" ]]; then
            sed 's/^/  /' "$changed_files"
          else
            echo "  <none>"
          fi
          echo "::endgroup::"

          while IFS= read -r file; do
            case "$file" in
              bootstrap/06.iac_runner/*|scripts/deploy_iac_runner_bootstrap.sh|.github/workflows/deploy-platform.yml)
                echo true > "$changed_file"
                ;;
            esac
          done < "$changed_files"

          changed="$(cat "$changed_file")"
          rm -f "$changed_file" "$changed_files"

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "IaC Runner bootstrap changed: $changed"

      - name: Configure SSH key for IaC Runner bootstrap update
        if: steps.runner-changes.outputs.changed == 'true'
        env:
          INFRA2_WATCHDOG_SSH_PRIVATE_KEY: ${{ secrets.INFRA2_WATCHDOG_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${INFRA2_WATCHDOG_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_PRIVATE_KEY is required when IaC Runner bootstrap files change."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$INFRA2_WATCHDOG_SSH_PRIVATE_KEY" > ~/.ssh/infra2_bootstrap
          chmod 600 ~/.ssh/infra2_bootstrap

      - name: Deploy IaC Runner bootstrap changes
        if: steps.runner-changes.outputs.changed == 'true'
        env:
          INFRA2_WATCHDOG_SSH_HOST: ${{ secrets.INFRA2_WATCHDOG_SSH_HOST }}
          INFRA2_WATCHDOG_SSH_USER: ${{ secrets.INFRA2_WATCHDOG_SSH_USER }}
          INFRA2_WATCHDOG_SSH_PORT: ${{ vars.INFRA2_WATCHDOG_SSH_PORT }}
        run: |
          set -euo pipefail

          if [[ -z "${INFRA2_WATCHDOG_SSH_HOST:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_HOST is required when IaC Runner bootstrap files change."
            exit 1
          fi
          if [[ -z "${INFRA2_WATCHDOG_SSH_USER:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_USER is required when IaC Runner bootstrap files change."
            exit 1
          fi

          ssh_port="${INFRA2_WATCHDOG_SSH_PORT:-22}"
          ssh \
            -i ~/.ssh/infra2_bootstrap \
            -p "$ssh_port" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${INFRA2_WATCHDOG_SSH_USER}@${INFRA2_WATCHDOG_SSH_HOST}" \
            "INFRA2_DEPLOY_SHA='${GITHUB_SHA}' bash -s" \
            < scripts/deploy_iac_runner_bootstrap.sh

      - name: Check IaC Runner health
        env:
          IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
        run: |
          set -euo pipefail

          health_url="${IAC_RUNNER_URL%/}/health"
          body="$(mktemp)"
          last_status=""

          for attempt in $(seq 1 12); do
            : > "$body"
            status="$(curl -sS -o "$body" -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 20 \
              "$health_url" || true)"
            last_status="$status"

            echo "IaC Runner public health attempt ${attempt}/12: url=$health_url status=$status"
            if [[ -s "$body" ]]; then
              sed 's/^/  /' "$body" || true
            else
              echo "  <empty body>"
            fi

            if [[ "$status" == "200" ]]; then
              rm -f "$body"
              exit 0
            fi

            sleep 10
          done

          rm -f "$body"
          echo "::error::IaC Runner public health stayed unhealthy after 12 attempts. Last HTTP status: $last_status. Check Traefik/Dokploy routing, Cloudflare propagation, VAULT_APP_TOKEN, and iac-runner container health."
          exit 1

      - name: Trigger IaC Runner
        env:
          WEBHOOK_SECRET: ${{ secrets.IAC_WEBHOOK_SECRET }}
          IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
        run: |
          set -euo pipefail

          if [[ -z "${WEBHOOK_SECRET:-}" ]]; then
            echo "::error::IAC_WEBHOOK_SECRET is not configured."
            exit 1
          fi

          ENV="${{ steps.target.outputs.env }}"
          REF="${{ steps.deploy-ref.outputs.sha }}"
          SOURCE_REF="${{ steps.deploy-ref.outputs.source_ref }}"
          SHORT_SHA="${{ steps.deploy-ref.outputs.short_sha }}"

          send_signed_json() {
            local endpoint="$1"
            local payload="$2"
            local output="$3"
            local timestamp
            local nonce
            local signature
            timestamp="$(date +%s)"
            nonce="$(openssl rand -hex 16)"
            signature=$(printf '%s' "${timestamp}.${nonce}.${payload}" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
            curl --fail-with-body \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 60 \
              -sS \
              -o "$output" \
              -X POST "${IAC_RUNNER_URL%/}${endpoint}" \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=$signature" \
              -H "X-IAC-Timestamp: $timestamp" \
              -H "X-IAC-Nonce: $nonce" \
              -d "$payload"
          }

          print_deploy_summary() {
            local body="$1"
            jq -r '"status=\(.status) deployment_id=\(.deployment_id) env=\(.env) ref=\(.ref[0:12])"' "$body"
          }

          DEPLOY_PAYLOAD=$(jq -cn \
            --arg env "$ENV" \
            --arg ref "$REF" \
            --arg source_ref "$SOURCE_REF" \
            --arg triggered_by "${{ github.actor }}" \
            --arg force "${{ steps.target.outputs.force_redeploy_all }}" \
            '{
              env: $env,
              ref: $ref,
              source_ref: $source_ref,
              triggered_by: $triggered_by,
              wait: false,
              services: (if $force == "true" then ["__all__"] else [] end)
            }')
          DEPLOY_BODY="$(mktemp)"

          echo "Starting IaC Runner deployment for ${SOURCE_REF} (${SHORT_SHA})..."
          send_signed_json "/deploy" "$DEPLOY_PAYLOAD" "$DEPLOY_BODY"
          print_deploy_summary "$DEPLOY_BODY"

          STATUS_PAYLOAD=$(jq -cn \
            --arg env "$ENV" \
            --arg ref "$REF" \
            --arg source_ref "$SOURCE_REF" \
            --arg triggered_by "${{ github.actor }}" \
            '{env: $env, ref: $ref, source_ref: $source_ref, triggered_by: $triggered_by}')

          for attempt in $(seq 1 90); do
            STATUS_BODY="$(mktemp)"
            echo "Polling IaC Runner deployment status (attempt ${attempt}/90)..."
            send_signed_json "/deploy/status" "$STATUS_PAYLOAD" "$STATUS_BODY"
            print_deploy_summary "$STATUS_BODY"
            STATUS="$(jq -r '.status' "$STATUS_BODY")"
            case "$STATUS" in
              completed)
                echo "IaC Runner deployment completed successfully."
                exit 0
                ;;
              failed)
                echo "::error::IaC Runner deployment failed."
                jq -r '.result.failure_summary[]? | "failure service=\(.service) task=\(.task) kind=\(.error_kind) summary=\(.summary)"' "$STATUS_BODY"
                exit 1
                ;;
              in_progress)
                sleep 10
                ;;
              *)
                echo "::error::Unexpected IaC Runner deployment status: $STATUS"
                exit 1
                ;;
            esac
          done

          echo "::error::Timed out waiting for IaC Runner deployment status."
          exit 1
