name: Platform Deployment

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "platform/**"
      - "finance_report/**"
      - "finance/**"
      - "libs/**"
      - ".github/workflows/deploy-platform.yml"
  workflow_dispatch:
    inputs:
      env:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git Reference (branch/tag)'
        required: true
        default: 'main'

permissions:
  contents: read

concurrency:
  group: platform-deployment-${{ github.event_name == 'workflow_dispatch' && inputs.env || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Deployment Target
        id: target
        run: |
          set -euo pipefail

          # Default from inputs (workflow_dispatch)
          ENV="${{ inputs.env }}"
          REF="${{ inputs.ref }}"
          
          # Override if push event
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              ENV="production"
              REF="${{ github.ref_name }}"
            elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
              ENV="staging"
              REF="main"
            fi
          fi
          
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          
          echo "🚀 Deploying $REF to $ENV"

      - name: Check IaC Runner health
        env:
          IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
        run: |
          set -euo pipefail

          body="$(mktemp)"
          status="$(curl -sS -o "$body" -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 20 \
            "${IAC_RUNNER_URL%/}/health" || true)"

          echo "IaC Runner health HTTP status: $status"
          cat "$body" || true

          if [[ "$status" != "200" ]]; then
            echo "::error::IaC Runner health check failed before deployment. Check Dokploy bootstrap/iac_runner source path, domain routing, VAULT_APP_TOKEN, and iac-runner container health."
            exit 1
          fi

      - name: Trigger IaC Runner
        env:
          WEBHOOK_SECRET: ${{ secrets.IAC_WEBHOOK_SECRET }}
          IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
        run: |
          set -euo pipefail

          if [[ -z "${WEBHOOK_SECRET:-}" ]]; then
            echo "::error::IAC_WEBHOOK_SECRET is not configured."
            exit 1
          fi

          ENV="${{ steps.target.outputs.env }}"
          REF="${{ steps.target.outputs.ref }}"
          
          PAYLOAD=$(cat <<EOF
          {
            "env": "$ENV",
            "ref": "$REF",
            "triggered_by": "${{ github.actor }}",
            "wait": true
          }
          EOF
          )
          
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          
          echo "Sending payload to IaC Runner..."
          curl --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 1800 \
            -X POST "${IAC_RUNNER_URL%/}/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
