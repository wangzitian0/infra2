name: Reconcile IaC Inputs

# Main-branch input-drift reconcile for iac_pinned services.
# Dokploy native autoDeploy stays disabled; this workflow is the GitOps trigger
# that feeds changed inputs into deploy_v2/iac_runner, where the Deployer
# config-hash gate decides no-op vs real redeploy.

"on":
  push:
    branches: [main]
    paths:
      - "platform/**"
      - "finance_report/finance_report/**"
      - "libs/**"
      - "tools/**"
      - "common/**"
      - "docs/ssot/deploy-dependencies.yaml"
      - ".github/workflows/reconcile-iac-inputs.yml"
  workflow_dispatch:
    inputs:
      before:
        description: "Optional base commit for changed-file detection"
        required: false
        default: ""
      after:
        description: "Target infra2 commit SHA; defaults to this workflow ref"
        required: false
        default: ""
      dry_run:
        description: "Plan and summarize without invoking deploy_v2"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: iac-input-reconcile-main
  cancel-in-progress: false

jobs:
  reconcile:
    name: reconcile iac-pinned inputs
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IAC_WEBHOOK_SECRET: ${{ secrets.IAC_WEBHOOK_SECRET }}
      IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
      INTERNAL_DOMAIN: ${{ vars.INTERNAL_DOMAIN || 'zitian.party' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install httpx python-dotenv pyyaml rich

      - name: Reconcile changed IaC inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          INPUT_BEFORE: ${{ inputs.before || '' }}
          INPUT_AFTER: ${{ inputs.after || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || false }}
        run: |
          set -euo pipefail

          before="$EVENT_BEFORE"
          after="$GITHUB_SHA"
          dry_run="false"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            before="$INPUT_BEFORE"
            after="${INPUT_AFTER:-$GITHUB_SHA}"
            dry_run="$INPUT_DRY_RUN"
          fi

          if [[ "$dry_run" != "true" && -z "${IAC_WEBHOOK_SECRET:-}" ]]; then
            echo "::error::IAC_WEBHOOK_SECRET is required for IaC input reconcile."
            exit 1
          fi
          if [[ "$dry_run" != "true" && -z "${IAC_RUNNER_URL:-}" ]]; then
            echo "::error::IAC_RUNNER_URL is required for IaC input reconcile."
            exit 1
          fi

          args=(--after "$after"
                --domain "$INTERNAL_DOMAIN"
                --timeout 3300
                --output-json reconcile-result.json)
          [[ -n "$before" ]] && args+=(--before "$before")
          [[ "$dry_run" == "true" ]] && args+=(--dry-run)

          python -m tools.reconcile_iac_inputs "${args[@]}"

      - name: Upload reconcile result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-input-reconcile-result
          path: reconcile-result.json
          if-no-files-found: ignore
