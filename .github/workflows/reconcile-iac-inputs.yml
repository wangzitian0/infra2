name: Reconcile IaC Inputs

# Release-tag input-drift reconcile for iac_pinned services.
# staging/prod deploy immutable release tags only (promote-not-rebuild), so this GitOps
# trigger fires on a release tag push — NOT on every main push — and promotes that tag.
# It diffs the previous release tag -> this tag, fans the changed iac_pinned services into
# deploy_v2/iac_runner (pinned to the tag), where the Deployer config-hash gate decides
# no-op vs real redeploy. Dokploy native autoDeploy stays disabled.

"on":
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      before:
        description: "Optional base release tag for changed-file detection (defaults to the previous v*.*.* tag)"
        required: false
        default: ""
      after:
        description: "Target release tag to promote; defaults to this workflow ref"
        required: false
        default: ""
      dry_run:
        description: "Plan and summarize without invoking deploy_v2"
        required: false
        type: boolean
        default: false
      promote_prod:
        description: "Explicitly promote PROD (production deploys). A tag push never auto-deploys prod — only staging soaks automatically."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: iac-input-reconcile-main
  cancel-in-progress: false

jobs:
  reconcile:
    name: reconcile iac-pinned inputs
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IAC_WEBHOOK_SECRET: ${{ secrets.IAC_WEBHOOK_SECRET }}
      IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
      INTERNAL_DOMAIN: ${{ vars.INTERNAL_DOMAIN || 'zitian.party' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install httpx python-dotenv pyyaml rich

      # A tag-push checkout has the full history (fetch-depth: 0) but no origin/main
      # remote-tracking ref. The reconcile guard (assert_after_on_main) refuses any tag
      # not reachable from origin/main, so make that ref resolvable here.
      - name: Fetch origin/main for provenance guard
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Reconcile changed IaC inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_BEFORE: ${{ inputs.before || '' }}
          INPUT_AFTER: ${{ inputs.after || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || false }}
          INPUT_PROMOTE_PROD: ${{ inputs.promote_prod || false }}
        run: |
          set -euo pipefail

          # after = the release tag being promoted; before = the previous v*.*.* tag.
          # staging/prod accept tags only, so reconcile always pins the tag (not a sha).
          after="$REF_NAME"
          dry_run="false"
          # Release decoupling: a tag push auto-applies STAGING only (soak). Prod is an
          # explicit, deliberate promotion via workflow_dispatch (promote_prod=true) —
          # a tag push NEVER auto-deploys prod.
          promote_prod="false"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            after="${INPUT_AFTER:-$REF_NAME}"
            dry_run="$INPUT_DRY_RUN"
            promote_prod="$INPUT_PROMOTE_PROD"
          fi

          before="${INPUT_BEFORE:-}"
          if [[ -z "$before" ]]; then
            # Most recent release tag strictly before `after` (empty on the first release).
            before="$(git tag --list 'v*.*.*' --sort=-v:refname --merged "${after}^" 2>/dev/null | head -n1 || true)"
          fi
          echo "Promoting release tag '$after' (base '${before:-<none>}')"

          if [[ "$dry_run" != "true" && -z "${IAC_WEBHOOK_SECRET:-}" ]]; then
            echo "::error::IAC_WEBHOOK_SECRET is required for IaC input reconcile."
            exit 1
          fi
          if [[ "$dry_run" != "true" && -z "${IAC_RUNNER_URL:-}" ]]; then
            echo "::error::IAC_RUNNER_URL is required for IaC input reconcile."
            exit 1
          fi

          args=(--after "$after"
                --domain "$INTERNAL_DOMAIN"
                --timeout 3300
                --output-json reconcile-result.json)
          [[ -n "$before" ]] && args+=(--before "$before")
          [[ "$dry_run" == "true" ]] && args+=(--dry-run)
          [[ "$promote_prod" == "true" ]] && args+=(--promote-prod)

          python -m tools.reconcile_iac_inputs "${args[@]}"

      - name: Upload reconcile result
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: iac-input-reconcile-result
          path: reconcile-result.json
          if-no-files-found: ignore
