name: deploy_v2 Acceptance Canary

# The acceptance gate for the unified deploy primitive (Infra-009, finance_report#883).
# Exercises the WHOLE deploy_v2 path against real Dokploy: stand up a throwaway preview
# alias (default pr-999) via the unified front door, wait for HTTP 200, then tear it (and
# its ephemeral DB) back down. A green run here is the live proof that deploy_v2 deploys —
# the thing the trio (#341/#342/#343) could only unit-test with mocked backends.
#
# This is infra2's DEPLOY-PATH self-probe (sibling of dokploy-route-canary, the routing
# probe). Green => infra2's deploy machinery is OK; red => it is broken. Like the route
# canary it runs on GitHub Actions (external — survives infra2 itself being down) and, on a
# non-PR failure, alerts out-of-band via the SAME Feishu path the watchdog uses.
#
# Four triggers:
#  - pull_request, PATH-FILTERED to the deploy tooling: a PRE-MERGE probe — prove the change
#    still deploys before it lands. A PR failure is CI feedback to the author (NO out-of-band
#    alert — `--alert-on-failure` is omitted on PRs).
#  - push to main, PATH-FILTERED to the deploy tooling: a post-merge smoke test. A merge that
#    changes how we deploy (deploy_v2 / backends / resolver / Dokploy client / preview template)
#    immediately re-proves the whole path still deploys end-to-end against real Dokploy. It
#    canaries main/main (the push event carries no inputs, so the `|| 'main'` fallbacks apply).
#    This CANNOT block the merge (it already landed) — it is an early-warning alarm that the
#    deploy path is broken BEFORE someone attempts a real staging/prod deploy.
#  - schedule: a low-frequency live soak so an out-of-band regression (Dokploy drift) surfaces.
#  - workflow_dispatch: operator-driven, any ref.
# The reserved pr-<N> slot + concurrency group serialize runs; #355 made it fast-fail on a
# broken deploy and tear down cleanly, so a post-merge run is cheap and self-cleaning.

on:
  push:
    branches: [main]
    paths: &deploy_tooling_paths
      - "tools/deploy_v2.py"
      - "tools/deploy_v2_canary.py"
      - "tools/deploy_primitive.py"
      - "tools/deploy_contract.py"
      - "tools/deploy_env_config.py"
      - "tools/resolve_deploy_ref.py"
      - "tools/preview_lifecycle.py"
      - "libs/dokploy.py"
      # the WHOLE preview template is cloned + mounted at deploy time (compose.yaml AND
      # vault-agent.hcl / secrets.ctmpl / vault-policy.hcl) — any of them changes the live
      # deploy, so re-canary on any of them, not just the compose file.
      - "finance_report/finance_report/preview/**"
      - ".github/workflows/deploy-v2-canary.yml"
  pull_request:
    paths: *deploy_tooling_paths
  workflow_dispatch:
    inputs:
      version_ref:
        description: "Code surface to canary: main | release/x.y | vX.Y.Z | full 40-hex sha"
        required: false
        default: "main"
      iac_ref:
        description: "infra2 ref pinning the IaC: a branch/tag or full 40-hex sha"
        required: false
        default: "main"
      domain:
        description: "Base domain"
        required: false
        default: "zitian.party"
      timeout:
        description: "Health-check seconds"
        required: false
        default: "600"
  schedule:
    # Low-frequency live soak so a regression in the deploy path surfaces out of band.
    - cron: "37 6 * * *"

permissions:
  contents: read

concurrency:
  # Serialize: the canary owns the reserved pr-999 alias; never run two at once.
  group: deploy-v2-canary
  cancel-in-progress: false

jobs:
  canary:
    name: deploy_v2 live canary
    # Skip FORK PRs: they get no secrets, so the live deploy can't run — skip (not fail) to
    # avoid noisy red checks for external contributors. Same-repo PRs + push/cron/manual run.
    if: >-
      ${{ github.event_name != 'pull_request'
          || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      INTERNAL_DOMAIN: ${{ github.event.inputs.domain || 'zitian.party' }}
      # out-of-band Feishu delivery (same secrets the watchdog uses) — a red probe pages.
      # Injected ONLY for non-PR events: a PR run never uses --alert-on-failure, so do not
      # expose alerting credentials to PR code (smaller blast radius).
      INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE || '' }}
      INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL || '' }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_ID: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_ID || '' }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET || '' }}
      INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID || '' }}
      INFRA2_OUT_OF_BAND_FEISHU_API_BASE: ${{ github.event_name != 'pull_request' && secrets.INFRA2_OUT_OF_BAND_FEISHU_API_BASE || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install httpx python-dotenv rich

      - name: Run deploy_v2 canary
        env:
          VERSION_REF_INPUT: ${{ github.event.inputs.version_ref || 'main' }}
          IAC_REF_INPUT: ${{ github.event.inputs.iac_ref || 'main' }}
          DOMAIN_INPUT: ${{ github.event.inputs.domain || 'zitian.party' }}
          TIMEOUT_INPUT: ${{ github.event.inputs.timeout || '600' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ -z "${DOKPLOY_API_KEY:-}" ]]; then
            echo "::error::DOKPLOY_API_KEY secret is required for the deploy_v2 canary."
            exit 1
          fi

          # Out-of-band alert ONLY on a non-PR failure: post-merge/scheduled red = an infra
          # incident (page); a PR red is CI feedback to the author (no page).
          alert_args=()
          [[ "$EVENT_NAME" != "pull_request" ]] && alert_args+=(--alert-on-failure)

          # The canary prints a single JSON line on success; capture it so we can assert
          # the stack was actually torn down (no leaked ephemeral stack) before passing.
          set +e
          out="$(python -m tools.deploy_v2_canary \
            --version-ref "$VERSION_REF_INPUT" \
            --iac-ref "$IAC_REF_INPUT" \
            --domain "$DOMAIN_INPUT" \
            --timeout "$TIMEOUT_INPUT" \
            "${alert_args[@]}")"
          rc=$?
          set -e

          echo "canary output: $out"
          {
            echo "## deploy_v2 Acceptance Canary"
            echo ""
            echo '```json'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ $rc -ne 0 ]]; then
            echo "::error::deploy_v2 canary failed (exit $rc) — the unified deploy path did not go green."
            exit $rc
          fi

          # Belt-and-braces: even on exit 0, refuse to pass if teardown did not run, so a
          # canary can never leave its ephemeral stack behind.
          if ! echo "$out" | python -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get("torn_down") else 1)'; then
            echo "::error::canary did not tear down its stack (torn_down != true) — possible leak."
            exit 1
          fi
          echo "deploy_v2 acceptance canary is GREEN — the unified path deploys and converges."
