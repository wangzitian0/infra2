name: Infrastructure CI

on:
  pull_request:
    paths:
      - 'bootstrap/**'
      - 'platform/**'
      - 'finance_report/**'
      - 'libs/**'
      - 'tools/**'
      - 'cloudflare/**'
      - 'docs/ssot/**'
      - 'docs/project/**'
      - '.github/workflows/infra-ci.yml'
      - '.github/workflows/deploy-platform.yml'
      - '.github/workflows/out-of-band-watchdog.yml'
      - '.github/workflows/watchdog-weekly-digest.yml'
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'platform/**'
      - 'finance_report/**'
      - 'libs/**'
      - 'tools/**'
      - 'cloudflare/**'
      - 'docs/ssot/**'
      - 'docs/project/**'
      - '.github/workflows/infra-ci.yml'
      - '.github/workflows/deploy-platform.yml'
      - '.github/workflows/out-of-band-watchdog.yml'
      - '.github/workflows/watchdog-weekly-digest.yml'

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all compose.yaml files
        run: |
          set -e
          echo "🔍 Validating compose files..."
          find . -name "compose.yaml" -type f | while read -r file; do
            echo "Validating: $file"
            docker compose -f "$file" config > /dev/null
          done
          echo "✅ All compose files are valid"
        env:
          DATA_PATH: /tmp/infra2-data
          FEISHU_APP_ID: dummy-feishu-app-id
          FEISHU_APP_SECRET: dummy-feishu-app-secret
          FEISHU_VERIFICATION_TOKEN: dummy-feishu-verification-token
          FEISHU_ENCRYPT_KEY: dummy-feishu-encrypt-key
          LLM_API_KEY: dummy-llm-api-key
          OPENCLAW_GATEWAY_TOKEN: dummy-openclaw-gateway-token
          GOG_KEYRING_PASSWORD: dummy-keyring-password

  test-deployer-logic:
    name: Test Deployer Hash Logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          cd ${{ github.workspace }}
          uv pip install --system invoke httpx python-dotenv rich

      - name: Test config hash idempotency
        run: |
          cd ${{ github.workspace }}
          python -c "
          import sys
          sys.path.insert(0, 'libs')
          from deployer import _compute_config_hash
          
          # Test hash stability with different order
          hash1 = _compute_config_hash('test: true', {'A': '1', 'B': '2'})
          hash2 = _compute_config_hash('test: true', {'B': '2', 'A': '1'})
          assert hash1 == hash2, f'Hash not stable! {hash1} != {hash2}'
          
          # Test hash changes when content changes
          hash3 = _compute_config_hash('test: false', {'A': '1', 'B': '2'})
          assert hash1 != hash3, 'Hash should change with content'
          
          print('✅ Config hash idempotency verified')
          "

      - name: Test service discovery
        run: |
          cd ${{ github.workspace }}
          python -c "
          import sys
          sys.path.insert(0, 'libs')
          from deployer import discover_services
          
          services = discover_services()
          print(f'Discovered {len(services)} services:')
          for key, task in sorted(services.items()):
            print(f'  {key} -> {task}')
          
          assert len(services) > 0, 'Should discover at least one service'
          print('✅ Service discovery working')
          "

      - name: Run infra unit tests
        run: |
          cd ${{ github.workspace }}
          uv run python -P -m pytest libs/tests -q

      - name: Gate watchdog signal consistency
        run: |
          cd ${{ github.workspace }}
          uv run python tools/watchdog_consistency_audit.py

      - name: Gate backup inventory covers registered data paths
        run: |
          cd ${{ github.workspace }}
          uv run python -c "
          from libs.backup_verification import load_backup_inventory
          entries = load_backup_inventory()
          assert entries, 'Backup inventory must not be empty'
          ids = [e.service_id for e in entries]
          assert len(ids) == len(set(ids)), 'Duplicate backup service_id'
          for e in entries:
              assert e.data_path.startswith('/data/'), f'{e.service_id} data_path must live under /data/'
              assert e.method, f'{e.service_id} missing backup method'
          print(f'✅ Backup inventory covers {len(ids)} services')
          "

  test-1password-healthcheck:
    name: Test 1Password Healthcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build healthcheck binary
        run: |
          cd ${{ github.workspace }}
          GO111MODULE=off go test ./bootstrap/04.1password
          GO111MODULE=off go build -o /tmp/op-connect-healthcheck ./bootstrap/04.1password

  validate-vault-agent:
    name: Validate Vault Agent Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check vault-agent.hcl has required settings
        run: |
          set -e
          echo "🔍 Checking vault-agent.hcl files..."
          failed=0
          for file in $(find . -name "vault-agent.hcl" -type f); do
            echo "Checking: $file"
            if ! grep -q "exit_on_err = true" "$file"; then
              echo "❌ Missing 'exit_on_err = true' in $file"
              failed=1
            fi
            if ! grep -q "exit_on_retry_failure = true" "$file"; then
              echo "❌ Missing 'exit_on_retry_failure = true' in $file"
              failed=1
            fi
          done
          for file in $(find . -name "compose.yaml" -type f); do
            if ! grep -q "VAULT_APP_TOKEN" "$file"; then
              continue
            fi
            echo "Checking vault-agent health behavior: $file"
            if ! grep -q "rm -f /vault/secrets/.env" "$file"; then
              echo "❌ Vault agent does not clear stale secrets before auth in $file"
              failed=1
            fi
            if ! grep -q "vault token lookup" "$file"; then
              echo "❌ Vault agent healthcheck does not validate token lookup in $file"
              failed=1
            fi
            if ! grep -q "<no value>" "$file"; then
              echo "❌ Vault agent healthcheck does not reject unresolved template values in $file"
              failed=1
            fi
            if grep -q "VAULT_AGENT_MAX_SECRET_AGE_SECONDS\\|stat -c %Y" "$file"; then
              echo "❌ Vault agent Docker healthcheck must not use rendered-file mtime freshness in $file"
              failed=1
            fi
          done
          if [ $failed -eq 1 ]; then
            echo ""
            echo "⚠️  vault-agent.hcl files must have exit settings to prevent"
            echo "   zombie containers when tokens expire. Compose healthchecks"
            echo "   must validate token lookup and clear stale secrets."
            exit 1
          fi
          echo "✅ All vault-agent files have required exit and health settings"

  validate-vault-policy:
    name: Validate Vault Policy Syntax
    runs-on: ubuntu-latest
    # This job is advisory - vault policy fmt has container issues in GHA
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-hcl2
        run: pip install python-hcl2

      - name: Validate vault-policy.hcl syntax
        run: |
          set -e
          echo "🔍 Validating vault-policy.hcl files..."
          failed=0
          for file in $(find . -name "vault-policy.hcl" -type f); do
            echo "Checking: $file"
            if python3 -c "import hcl2, json; f=open('$file'); hcl2.load(f)" 2>&1; then
              echo "  ✅ Valid HCL"
            else
              echo "  ❌ Invalid HCL syntax"
              failed=1
            fi
          done
          if [ $failed -eq 1 ]; then
            echo ""
            echo "⚠️  Fix HCL syntax errors before merging."
            exit 1
          fi
          echo "✅ All vault-policy.hcl files have valid syntax"

  validate-deployers:
    name: Validate Deployer Classes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          cd ${{ github.workspace }}
          uv pip install --system invoke httpx python-dotenv rich

      - name: Validate all deploy.py files
        run: |
          cd ${{ github.workspace }}
          python -c "
          import sys
          import importlib.util
          from pathlib import Path

          sys.path.insert(0, '.')

          failed = []
          deploy_files = list(Path('.').rglob('deploy.py'))

          print(f'Found {len(deploy_files)} deploy.py files')

          for deploy_file in deploy_files:
            # Skip playground and tests
            if 'playground' in str(deploy_file) or 'test' in str(deploy_file):
              continue

            print(f'Validating: {deploy_file}')
            try:
              # Load the module
              spec = importlib.util.spec_from_file_location('deploy', deploy_file)
              module = importlib.util.module_from_spec(spec)

              # Import libs.deployer to get Deployer class
              from libs.deployer import Deployer

              # Execute the module
              spec.loader.exec_module(module)

              # Find Deployer subclass
              deployer_cls = None
              for name, obj in vars(module).items():
                if isinstance(obj, type) and issubclass(obj, Deployer) and obj is not Deployer:
                  deployer_cls = obj
                  break

              if deployer_cls:
                # Validate required attributes
                errors = []
                if not deployer_cls.service:
                  errors.append('missing service name')
                if not deployer_cls.compose_path:
                  errors.append('missing compose_path')
                # data_path is optional for stateless services (e.g., app containers)

                # Validate compose_path exists
                compose_path = Path(deployer_cls.compose_path)
                if not compose_path.exists():
                  errors.append(f'compose file not found: {deployer_cls.compose_path}')

                if errors:
                  failed.append((deploy_file, errors))
                  print(f'  ❌ {deploy_file}: {errors}')
                else:
                  print(f'  ✅ {deployer_cls.__name__}: service={deployer_cls.service}')
              else:
                print(f'  ⚠️ No Deployer subclass found (may be OK for bootstrap)')

            except Exception as e:
              failed.append((deploy_file, [str(e)]))
              print(f'  ❌ {deploy_file}: {e}')

          if failed:
            print(f'\\n❌ {len(failed)} deploy.py files have errors')
            sys.exit(1)

          print(f'\\n✅ All deploy.py files validated')
          "

  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check libs/ bootstrap/ platform/ finance_report/ tools/

      - name: Determine changed Python files
        id: changed-python
        run: |
          base_ref="${{ github.base_ref }}"
          if [ -z "$base_ref" ]; then
            base_ref="main"
          fi
          git fetch origin "$base_ref" --depth=1
          files=$(git diff --name-only "origin/$base_ref...HEAD" -- libs bootstrap platform finance_report tools | grep -E '\.py$' || true)
          files="${files//$'\n'/ }"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run ruff format check
        if: steps.changed-python.outputs.files != ''
        run: ruff format --check ${{ steps.changed-python.outputs.files }}
