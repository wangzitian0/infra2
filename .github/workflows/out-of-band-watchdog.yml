name: Infra2 Out-of-Band Watchdog

"on":
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks without sending Feishu notifications"
        required: false
        type: boolean
        default: false
      ssh_targets_override:
        description: "Optional newline-separated name|command|expected_text SSH targets for manual diagnostics"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: infra2-out-of-band-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    name: Check infra2 host and alert bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE: ${{ secrets.INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE }}
      INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_ID: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_ID }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET }}
      INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID }}
      INFRA2_OUT_OF_BAND_FEISHU_API_BASE: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_API_BASE }}
      INFRA2_WATCHDOG_HTTP_TARGETS: ${{ vars.INFRA2_WATCHDOG_HTTP_TARGETS }}
      INFRA2_WATCHDOG_WORKER_STATUS_URL: ${{ vars.INFRA2_WATCHDOG_WORKER_STATUS_URL }}
      INFRA2_WATCHDOG_WORKER_STATUS_TOKEN: ${{ secrets.INFRA2_WATCHDOG_WORKER_STATUS_TOKEN }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID: ${{ vars.DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID }}
      DOKPLOY_ROUTE_CANARY_PROJECT: ${{ vars.DOKPLOY_ROUTE_CANARY_PROJECT }}
      DOKPLOY_ROUTE_CANARY_ENV: ${{ vars.DOKPLOY_ROUTE_CANARY_ENV }}
      DOKPLOY_ROUTE_CANARY_HOST: ${{ vars.DOKPLOY_ROUTE_CANARY_HOST }}
      DOKPLOY_ROUTE_CANARY_DOKPLOY_HOST: ${{ vars.DOKPLOY_ROUTE_CANARY_DOKPLOY_HOST }}
      DOKPLOY_ROUTE_CANARY_COMPOSE_NAME: ${{ vars.DOKPLOY_ROUTE_CANARY_COMPOSE_NAME }}
      DOKPLOY_ROUTE_CANARY_TIMEOUT_SECONDS: ${{ vars.DOKPLOY_ROUTE_CANARY_TIMEOUT_SECONDS }}
      DOKPLOY_ROUTE_CANARY_INTERVAL_SECONDS: ${{ vars.DOKPLOY_ROUTE_CANARY_INTERVAL_SECONDS }}
      INFRA2_WATCHDOG_SSH_HOST: ${{ secrets.INFRA2_WATCHDOG_SSH_HOST }}
      INFRA2_WATCHDOG_SSH_USER: ${{ secrets.INFRA2_WATCHDOG_SSH_USER }}
      INFRA2_WATCHDOG_SSH_PRIVATE_KEY: ${{ secrets.INFRA2_WATCHDOG_SSH_PRIVATE_KEY }}
      INFRA2_WATCHDOG_SSH_PORT: ${{ vars.INFRA2_WATCHDOG_SSH_PORT }}
      INFRA2_WATCHDOG_SSH_TARGETS: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_targets_override != '' && inputs.ssh_targets_override || vars.INFRA2_WATCHDOG_SSH_TARGETS }}
      WATCHDOG_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install httpx python-dotenv rich

      - name: Configure SSH key
        if: env.INFRA2_WATCHDOG_SSH_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$INFRA2_WATCHDOG_SSH_PRIVATE_KEY" > ~/.ssh/infra2_watchdog
          chmod 600 ~/.ssh/infra2_watchdog
          echo "INFRA2_WATCHDOG_SSH_KEY_PATH=$HOME/.ssh/infra2_watchdog" >> "$GITHUB_ENV"

      - name: Run watchdog
        run: python tools/out_of_band_watchdog.py
