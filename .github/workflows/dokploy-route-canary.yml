name: Dokploy Route Canary

on:
  push:
    branches: [main]
    paths:
      - "libs/dokploy*.py"
      - "tools/dokploy_route_canary.py"
      - ".github/workflows/dokploy-route-canary.yml"
      - "docs/ssot/ops.alerting.md"
      - "docs/project/Infra-011.reliability_hardening.md"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      environment_id:
        description: "Dokploy Environment ID to create the canary compose in"
        required: true
      project:
        description: "Dokploy project name"
        required: true
        default: "platform"
      env:
        description: "Dokploy environment name hint"
        required: false
        default: "staging"
      host:
        description: "Public host for the canary; defaults to route-canary.zitian.party"
        required: false
        default: ""
      compose_name:
        description: "Dokploy compose name"
        required: false
        default: "dokploy-route-canary"
      timeout_seconds:
        description: "Per-stage timeout"
        required: false
        default: "90"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: dokploy-route-canary-${{ github.event.inputs.project }}-${{ github.event.inputs.env }}
  cancel-in-progress: false

jobs:
  canary:
    name: Run dynamic route canary
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      INFRA2_WATCHDOG_SSH_HOST: ${{ secrets.INFRA2_WATCHDOG_SSH_HOST }}
      INFRA2_WATCHDOG_SSH_USER: ${{ secrets.INFRA2_WATCHDOG_SSH_USER }}
      INFRA2_WATCHDOG_SSH_PORT: ${{ vars.INFRA2_WATCHDOG_SSH_PORT }}
      DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID: ${{ vars.DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID }}
      DOKPLOY_ROUTE_CANARY_PROJECT: ${{ vars.DOKPLOY_ROUTE_CANARY_PROJECT }}
      DOKPLOY_ROUTE_CANARY_ENV: ${{ vars.DOKPLOY_ROUTE_CANARY_ENV }}
      DOKPLOY_ROUTE_CANARY_HOST: ${{ vars.DOKPLOY_ROUTE_CANARY_HOST }}
      DOKPLOY_ROUTE_CANARY_COMPOSE_NAME: ${{ vars.DOKPLOY_ROUTE_CANARY_COMPOSE_NAME }}
      DOKPLOY_ROUTE_CANARY_TIMEOUT_SECONDS: ${{ vars.DOKPLOY_ROUTE_CANARY_TIMEOUT_SECONDS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install httpx python-dotenv rich

      - name: Configure SSH key
        env:
          INFRA2_WATCHDOG_SSH_PRIVATE_KEY: ${{ secrets.INFRA2_WATCHDOG_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${INFRA2_WATCHDOG_SSH_PRIVATE_KEY:-}" ]]; then
            echo "No SSH key configured; canary will skip Docker container/label inspection."
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$INFRA2_WATCHDOG_SSH_PRIVATE_KEY" > ~/.ssh/infra2_canary
          chmod 600 ~/.ssh/infra2_canary
          echo "INFRA2_WATCHDOG_SSH_KEY_PATH=$HOME/.ssh/infra2_canary" >> "$GITHUB_ENV"

      - name: Run canary
        env:
          CANARY_HOST_INPUT: ${{ github.event.inputs.host || '' }}
          COMPOSE_NAME_INPUT: ${{ github.event.inputs.compose_name || '' }}
          ENVIRONMENT_ID_INPUT: ${{ github.event.inputs.environment_id || '' }}
          PROJECT_INPUT: ${{ github.event.inputs.project || '' }}
          ENV_NAME_INPUT: ${{ github.event.inputs.env || '' }}
          TIMEOUT_SECONDS_INPUT: ${{ github.event.inputs.timeout_seconds || '' }}
        run: |
          set -euo pipefail

          if [[ -z "${DOKPLOY_API_KEY:-}" ]]; then
            echo "::error::DOKPLOY_API_KEY secret is required for Dokploy Route Canary."
            exit 1
          fi

          environment_id="${ENVIRONMENT_ID_INPUT:-${DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID:-}}"
          if [[ -z "$environment_id" ]]; then
            echo "::error::DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID repository variable or workflow_dispatch environment_id input is required. failure_domain=dokploy-canary-configuration"
            {
              echo "## Dokploy Route Canary"
              echo ""
              echo "- Status: \`fail\`"
              echo "- Failure domain: \`dokploy-canary-configuration\`"
              echo "- Reason: DOKPLOY_ROUTE_CANARY_ENVIRONMENT_ID is not configured"
              echo "- Action: configure the repository variable or run workflow_dispatch with environment_id"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          canary_host="${CANARY_HOST_INPUT:-${DOKPLOY_ROUTE_CANARY_HOST:-route-canary.zitian.party}}"
          compose_name="${COMPOSE_NAME_INPUT:-${DOKPLOY_ROUTE_CANARY_COMPOSE_NAME:-dokploy-route-canary}}"
          project="${PROJECT_INPUT:-${DOKPLOY_ROUTE_CANARY_PROJECT:-platform}}"
          env_name="${ENV_NAME_INPUT:-${DOKPLOY_ROUTE_CANARY_ENV:-staging}}"
          timeout_seconds="${TIMEOUT_SECONDS_INPUT:-${DOKPLOY_ROUTE_CANARY_TIMEOUT_SECONDS:-90}}"

          echo "Canary summary will be written to $GITHUB_STEP_SUMMARY"
          python tools/dokploy_route_canary.py \
            --host "$canary_host" \
            --environment-id="$environment_id" \
            --project "$project" \
            --env "$env_name" \
            --compose-name "$compose_name" \
            --dokploy-host "cloud.zitian.party" \
            --nonce "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --timeout-seconds "$timeout_seconds" \
            --repair-stale-compose
