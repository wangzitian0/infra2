name: Config drift report

# T3 reconciler (#280 prod-fidelity / #274 residual): daily, is each prod service running the
# config the release tag specifies? Verifies deployed IAC_SOURCE_CONFIG_HASH provenance against
# IAC_DEPLOY_REF, then compares that secret-free identity with the release source.
# READ-ONLY (git object reads + Dokploy GETs); REPORT-only — posts daily to the 'infra2 reports'
# Lark group even when in sync, so the report's delivery self-proves the path (#425), and a real
# DRIFT is flagged loudly in the same report.
#
# REQUIRED secrets/vars to broadcast (until set, delivery no-ops cleanly):
#   secret DOKPLOY_API_KEY
#   var    INTERNAL_DOMAIN                        e.g. zitian.party
#   secret INFRA2_REPORTS_FEISHU_APP_ID / _APP_SECRET   (the infra2 Feishu app bot)
#   var    INFRA2_REPORTS_FEISHU_CHAT_ID          the 'infra2 reports' group chat_id
# Runtime secrets are deliberately excluded from this detector; it needs no 1Password grant.

"on":
  schedule:
    - cron: "0 1 * * *" # daily ~09:00 China time
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: config-drift-report
  cancel-in-progress: false

jobs:
  report:
    name: Compare prod config vs release tag
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      INTERNAL_DOMAIN: ${{ vars.INTERNAL_DOMAIN }}
      INFRA2_REPORTS_FEISHU_APP_ID: ${{ secrets.INFRA2_REPORTS_FEISHU_APP_ID }}
      INFRA2_REPORTS_FEISHU_APP_SECRET: ${{ secrets.INFRA2_REPORTS_FEISHU_APP_SECRET }}
      INFRA2_REPORTS_FEISHU_API_BASE: ${{ secrets.INFRA2_REPORTS_FEISHU_API_BASE }}
      INFRA2_REPORTS_FEISHU_CHAT_ID: ${{ vars.INFRA2_REPORTS_FEISHU_CHAT_ID }}
    steps:
      - name: Checkout (full history — needs release tags + git cat-file at the tag)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install httpx python-dotenv rich PyYAML invoke

      - name: Self-check (git-content hash == disk hash at HEAD)
        run: python tools/dokploy_config_drift.py --self-check

      - name: Report config drift to infra2 reports
        run: python tools/dokploy_config_drift.py --report --strict
