name: Infra2 Watchdog Weekly Digest

"on":
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate digest without Feishu delivery"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: infra2-watchdog-weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Build and send weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE: ${{ secrets.INFRA2_OUT_OF_BAND_ALERT_DELIVERY_MODE }}
      INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_WEBHOOK_URL }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_ID: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_ID }}
      INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_APP_SECRET }}
      INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_CHAT_ID }}
      INFRA2_OUT_OF_BAND_FEISHU_API_BASE: ${{ secrets.INFRA2_OUT_OF_BAND_FEISHU_API_BASE }}
      WATCHDOG_DIGEST_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install python-dotenv rich

      - name: Build and send digest
        run: python tools/watchdog_weekly_digest.py
