name: Deploy (deploy_v2)

# The infra2-owned deploy entrypoint for the finance_report app (Infra-009,
# finance_report#883: "infra2 owns every deploy"). Wraps `python -m tools.deploy_v2` —
# the unified (service, type, version_ref, iac_ref) front door — so any scenario (staging /
# prod / preview-main|pr|commit|tag) deploys through the SAME mechanism, by hand today and
# (next) triggered by App-repo CI via repository_dispatch.
#
# This replaces the per-env App-repo bash (tools/dokploy_deploy.sh). It is manual-only
# for now (operator-triggered): merging it changes no automated behavior, and running it
# is the live acceptance test for the unified path on a real fixed env (stronger than the
# throwaway-preview canary in ops-checks.yml).
#
# prod safety: RL-DATA-1 is deny-by-default in deploy_v2 — a prod deploy must pass BOTH
# staging_validated=true (staging-first) and code_reviewed=true (reviewed code on prod
# data), or the front door fails closed before any side effect.
#
# Pre-deploy canary GATE (staging/prod): before touching a real fixed env, the preflight_canary
# job canaries the EXACT (version_ref, iac_ref) on the throwaway slot; the real deploy job runs
# only if that canary is green (or skipped for preview types / skip_canary). A broken deploy
# path is caught on a disposable stack, never on real prod data. skip_canary=true bypasses it.

on:
  push:
    branches: ["main"]
    paths:
      - "bootstrap/06.iac_runner/**"
      - "scripts/deploy_iac_runner_bootstrap.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service key. Use bootstrap/iac-runner to run the IaC Runner bootstrap update."
        required: false
        default: finance_report/app
      type:
        description: "Deploy type (the scenario)"
        required: false
        default: staging
        type: choice
        options: [staging, prod, preview/branch, preview/pr, preview/commit, preview/tag]
      version_ref:
        description: "Version surface, interpreted by type: PR# (preview/pr) | tag vX.Y.Z (prod / preview/tag) | sha (preview/commit) | main"
        required: false
        default: "main"
      iac_ref:
        description: "infra2 ref surface: main | vX.Y.Z | <sha>"
        required: false
        default: "main"
      domain:
        description: "Base domain"
        required: false
        default: "zitian.party"
      staging_validated:
        description: "prod only — assert this code already passed staging"
        required: false
        type: boolean
        default: false
      code_reviewed:
        description: "prod only — positive RL-DATA-1 review signal (required for prod data)"
        required: false
        type: boolean
        default: false
      break_glass:
        description: "prod only — bypass staging-first (emergency)"
        required: false
        type: boolean
        default: false
      skip_canary:
        description: "skip the pre-deploy canary gate (staging/prod only; emergency)"
        required: false
        type: boolean
        default: false
      timeout:
        description: "health-check seconds"
        required: false
        default: "600"

permissions:
  contents: read

concurrency:
  # One in-flight deploy per type; never let two deploys race the same compose/slot.
  group: ${{ (github.event_name == 'push' || inputs.service == 'bootstrap/iac-runner') && 'iac-runner-bootstrap' || format('deploy-v2-{0}', github.event.inputs.type) }}
  cancel-in-progress: false

jobs:
  # Pre-deploy gate: canary the EXACT (version_ref, iac_ref) about to ship to a fixed env on
  # the throwaway pr-<N> slot. Green proves the deploy path + this artifact actually deploy
  # before we touch real staging/prod data. Only gates staging/prod (preview types already
  # ARE throwaway deploys). Shares the canary concurrency group so it never races the
  # scheduled/post-merge canary for the reserved slot. skip_canary is the emergency bypass.
  preflight_canary:
    name: preflight canary
    # Only the APP has a preview canary; a platform (iac_pinned) deploy is gated by
    # iac_runner's own checks, so skip the app canary for platform services.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          && inputs.service != 'bootstrap/iac-runner'
          && (github.event.inputs.type == 'staging' || github.event.inputs.type == 'prod')
          && github.event.inputs.skip_canary != 'true'
          && (github.event.inputs.service == 'finance_report/app'
              || github.event.inputs.service == '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-v2-canary
      cancel-in-progress: false
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      INTERNAL_DOMAIN: ${{ github.event.inputs.domain || 'zitian.party' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install runtime dependencies
        # deploy_v2_canary imports infra2_sdk.delivery (#498) — install the package
        # itself (as app-deploy-request.yml's canary step already does) instead of a
        # manually maintained subset that silently drifts out of sync with its imports.
        run: python -m pip install -e .
      - name: Canary the artifact before the real deploy
        env:
          VERSION_REF_INPUT: ${{ github.event.inputs.version_ref || 'main' }}
          IAC_REF_INPUT: ${{ github.event.inputs.iac_ref || 'main' }}
          DOMAIN_INPUT: ${{ github.event.inputs.domain || 'zitian.party' }}
          TIMEOUT_INPUT: ${{ github.event.inputs.timeout || '600' }}
        run: |
          set -euo pipefail
          if [[ -z "${DOKPLOY_API_KEY:-}" ]]; then
            echo "::error::DOKPLOY_API_KEY secret is required for the preflight canary."
            exit 1
          fi
          echo "Preflighting $VERSION_REF_INPUT (iac $IAC_REF_INPUT) on the canary slot..."
          python -m tools.deploy_v2_canary \
            --version-ref "$VERSION_REF_INPUT" \
            --iac-ref "$IAC_REF_INPUT" \
            --domain "$DOMAIN_INPUT" \
            --timeout "$TIMEOUT_INPUT"

  deploy:
    name: deploy_v2 ${{ github.event.inputs.type }}
    needs: [preflight_canary]
    # proceed when the canary passed, OR when it was skipped (preview types / skip_canary) —
    # but NEVER when it failed: a red canary means the deploy path is broken, so abort.
    if: >-
      ${{ always()
          && github.event_name == 'workflow_dispatch'
          && inputs.service != 'bootstrap/iac-runner'
          && (needs.preflight_canary.result == 'success'
              || needs.preflight_canary.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      # The ONE shared control-plane domain (libs.common.infra_domain, #561) --
      # cloud./vault./otel. host builds must NEVER follow a per-service app-routing
      # override (inputs.domain, e.g. truealpha.club), or they produce a nonexistent
      # hostname with no Traefik router or cert (a Cloudflare 526). app-deploy-
      # request.yml already gets this right (fixed vars.INTERNAL_DOMAIN, independent
      # of the per-request service domain); this job conflated the two by deriving it
      # from inputs.domain -- discovered live deploying truealpha#474 (a
      # truealpha/app prod deploy with inputs.domain=truealpha.club 526'd on
      # cloud.truealpha.club before any mutation). The per-service app-routing domain
      # still flows correctly to deploy_v2 via inputs.domain below (a separate,
      # already-decoupled --domain CLI argument, not this env var).
      INTERNAL_DOMAIN: ${{ vars.INTERNAL_DOMAIN || 'zitian.party' }}
      # platform (iac_pinned) services trigger the iac_runner webhook instead of Dokploy.
      IAC_WEBHOOK_SECRET: ${{ secrets.IAC_WEBHOOK_SECRET }}
      IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install invoke httpx python-dotenv rich

      - name: Run deploy_v2
        env:
          SERVICE_INPUT: ${{ github.event.inputs.service || 'finance_report/app' }}
          TYPE_INPUT: ${{ github.event.inputs.type }}
          VERSION_REF_INPUT: ${{ github.event.inputs.version_ref || 'main' }}
          IAC_REF_INPUT: ${{ github.event.inputs.iac_ref || 'main' }}
          DOMAIN_INPUT: ${{ github.event.inputs.domain || 'zitian.party' }}
          STAGING_VALIDATED_INPUT: ${{ github.event.inputs.staging_validated }}
          CODE_REVIEWED_INPUT: ${{ github.event.inputs.code_reviewed }}
          BREAK_GLASS_INPUT: ${{ github.event.inputs.break_glass }}
          TIMEOUT_INPUT: ${{ github.event.inputs.timeout || '600' }}
        run: |
          set -euo pipefail

          # App needs the Dokploy key; a platform (iac_pinned) service needs the iac_runner
          # webhook secret instead. Require the right one for the chosen service.
          if [[ "$SERVICE_INPUT" == platform/* ]]; then
            if [[ -z "${IAC_WEBHOOK_SECRET:-}" || -z "${IAC_RUNNER_URL:-}" ]]; then
              echo "::error::IAC_WEBHOOK_SECRET and IAC_RUNNER_URL are required for a platform deploy."
              exit 1
            fi
          elif [[ -z "${DOKPLOY_API_KEY:-}" ]]; then
            echo "::error::DOKPLOY_API_KEY secret is required to deploy."
            exit 1
          fi

          args=(--service "$SERVICE_INPUT"
                --type "$TYPE_INPUT"
                --version-ref "$VERSION_REF_INPUT"
                --iac-ref "$IAC_REF_INPUT"
                --domain "$DOMAIN_INPUT"
                --timeout "$TIMEOUT_INPUT")
          [[ "$STAGING_VALIDATED_INPUT" == "true" ]] && args+=(--staging-validated)
          [[ "$CODE_REVIEWED_INPUT" == "true" ]] && args+=(--code-reviewed)
          [[ "$BREAK_GLASS_INPUT" == "true" ]] && args+=(--break-glass)
          echo "deploy_v2 ${args[*]}"
          set +e
          out="$(python -m tools.deploy_v2 "${args[@]}")"
          rc=$?
          set -e

          echo "deploy_v2 output: $out"
          {
            echo "## Deploy (deploy_v2) — $TYPE_INPUT"
            echo ""
            echo '```json'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ $rc -ne 0 ]]; then
            echo "::error::deploy_v2 $TYPE_INPUT failed (exit $rc)."
            exit $rc
          fi
          echo "deploy_v2 $TYPE_INPUT succeeded."

  # IaC runner bootstrap jobs
  bootstrap:
    name: update iac_runner bootstrap
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.service == 'bootstrap/iac-runner') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure SSH key for IaC Runner bootstrap update
        env:
          INFRA2_WATCHDOG_SSH_PRIVATE_KEY: ${{ secrets.INFRA2_WATCHDOG_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${INFRA2_WATCHDOG_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_PRIVATE_KEY is required to update the IaC Runner bootstrap."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$INFRA2_WATCHDOG_SSH_PRIVATE_KEY" > ~/.ssh/infra2_bootstrap
          chmod 600 ~/.ssh/infra2_bootstrap

      - name: Deploy IaC Runner bootstrap changes
        env:
          INFRA2_WATCHDOG_SSH_HOST: ${{ secrets.INFRA2_WATCHDOG_SSH_HOST }}
          INFRA2_WATCHDOG_SSH_USER: ${{ secrets.INFRA2_WATCHDOG_SSH_USER }}
          INFRA2_WATCHDOG_SSH_PORT: ${{ vars.INFRA2_WATCHDOG_SSH_PORT }}
        run: |
          set -euo pipefail

          if [[ -z "${INFRA2_WATCHDOG_SSH_HOST:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_HOST is required."
            exit 1
          fi
          if [[ -z "${INFRA2_WATCHDOG_SSH_USER:-}" ]]; then
            echo "::error::INFRA2_WATCHDOG_SSH_USER is required."
            exit 1
          fi

          ssh_port="${INFRA2_WATCHDOG_SSH_PORT:-22}"
          ssh \
            -i ~/.ssh/infra2_bootstrap \
            -p "$ssh_port" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${INFRA2_WATCHDOG_SSH_USER}@${INFRA2_WATCHDOG_SSH_HOST}" \
            "INFRA2_DEPLOY_SHA='${GITHUB_SHA}' bash -s" \
            < scripts/deploy_iac_runner_bootstrap.sh

      - name: Check IaC Runner health
        env:
          IAC_RUNNER_URL: ${{ vars.IAC_RUNNER_URL || 'https://iac.zitian.party' }}
        run: |
          set -euo pipefail

          health_url="${IAC_RUNNER_URL%/}/health"
          body="$(mktemp)"
          last_status=""

          for attempt in $(seq 1 12); do
            : > "$body"
            status="$(curl -sS -o "$body" -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 20 \
              "$health_url" || true)"
            last_status="$status"

            echo "IaC Runner public health attempt ${attempt}/12: url=$health_url status=$status"
            if [[ -s "$body" ]]; then
              sed 's/^/  /' "$body" || true
            else
              echo "  <empty body>"
            fi

            if [[ "$status" == "200" ]]; then
              rm -f "$body"
              exit 0
            fi

            sleep 10
          done

          rm -f "$body"
          echo "::error::IaC Runner public health stayed unhealthy after 12 attempts. Last HTTP status: $last_status. Check Traefik/Dokploy routing, Cloudflare propagation, VAULT_APP_TOKEN, and iac-runner container health."
          exit 1
