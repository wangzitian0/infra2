# Finance Report Production Deployment
#
# IMPORTANT: This compose file runs database migrations on container startup.
#
# Deployment Considerations:
# - Migrations run automatically before the application starts
# - Alembic uses database locks to prevent concurrent migration conflicts
# - For zero-downtime deployments, ensure migrations are backward-compatible
# - Scale backend to 1 replica during deployments to avoid migration contention
# - Use 'docker compose up -d --no-deps --scale backend=1 backend' for updates
#
# Migration Safety:
# - Failed migrations prevent container startup (fail-fast)
# - Retry logic handles transient PostgreSQL connection issues
# - Healthcheck by default allows up to 180s for migration + startup time (configurable via BACKEND_HEALTHCHECK_START_PERIOD)
#
services:
  vault-agent:
    init: true  # tini as PID1 reaps healthcheck ssl_client zombies
    image: hashicorp/vault:1.15
    container_name: finance_report-app-vault-agent${ENV_SUFFIX}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    entrypoint:
      - sh
      - -c
      - |
        rm -f /vault/secrets/.env /vault/.token /vault/role_id /vault/secret_id 2>/dev/null || true
        if [ -z "$$VAULT_ROLE_ID" ] || [ -z "$$VAULT_SECRET_ID" ]; then
          echo "VAULT_ROLE_ID and VAULT_SECRET_ID are required"
          exit 1
        fi
        if [ -z "$$VAULT_ADDR" ]; then
          echo "VAULT_ADDR is required"
          exit 1
        fi
        echo "$$VAULT_ROLE_ID" > /vault/role_id
        echo "$$VAULT_SECRET_ID" > /vault/secret_id
        # AppRole auto_auth: vault-agent logs in and renews/re-auths the token
        # natively. No token_file decay, no manual renew loop.
        exec vault agent -config=/etc/vault/vault-agent.hcl
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      ENV: ${ENV}
      # Consumed by secrets.ctmpl to template OTEL_RESOURCE_ATTRIBUTES'
      # service.version=<sha> (Infra-014). Short image sha; "unknown" fallback.
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
      IAC_CONFIG_HASH: ${IAC_CONFIG_HASH:-}
    healthcheck:
      test:
        - CMD-SHELL
        - |
          # Secrets rendered + agent token (from sink) is valid
          test -s /vault/secrets/.env &&
          ! grep -q "<no value>" /vault/secrets/.env &&
          wget -q -T 3 --header="X-Vault-Token: $$(cat /vault/.token)" "$$VAULT_ADDR/v1/auth/token/lookup-self" -O /dev/null
      interval: 30s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./vault-agent.hcl:/etc/vault/vault-agent.hcl:ro
      - ./secrets.ctmpl:/etc/vault/secrets.ctmpl:ro
      - secrets:/vault/secrets
    networks:
      - dokploy-network

  backend:
    image: ghcr.io/wangzitian0/finance_report-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: finance_report-backend${ENV_SUFFIX}
    restart: always
    # ops.standards §5: preview/staging deploys override these lower via env.
    mem_limit: ${APP_BACKEND_MEM_LIMIT:-768m}
    cpu_shares: ${TIER_CPU_SHARES:-1024}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    depends_on:
      vault-agent:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Ensure we're in the app directory and set PYTHONPATH for alembic
        cd /app
        export PYTHONPATH=/app

        # Wait for secrets file to be rendered by vault-agent
        echo "🔍 [CHECKPOINT-1] Waiting for Vault secrets to be rendered..."
        while [ ! -f /secrets/.env ]; do
          echo "  ⏳ Secrets not ready yet, retrying..."
          sleep 1
        done
        echo "✅ [CHECKPOINT-1] Secrets file ready at /secrets/.env"
        
        set -a
        . /secrets/.env
        set +a

        # Run database migrations with retry logic
        # Retries handle cases where PostgreSQL might not be fully ready
        # Total retry time (~50s) fits within healthcheck start_period (60s)
        echo "🔍 [CHECKPOINT-2] Starting database migrations..."
        max_retries=10
        retry_interval=5
        attempt=1

        until alembic upgrade head; do
          if [ "$$attempt" -ge "$$max_retries" ]; then
            echo "❌ [CHECKPOINT-2] CRITICAL: Migrations failed after $$attempt attempts"
            echo "  Possible causes: DB not reachable, migration syntax error, connection string wrong"
            exit 1
          fi
          echo "  ⚠️  Migration attempt $$attempt/$$max_retries failed. Retrying in $$retry_interval seconds..."
          attempt=$$((attempt + 1))
          sleep $$retry_interval
        done

        echo "✅ [CHECKPOINT-2] Migrations completed successfully"
        echo "🔍 [CHECKPOINT-3] Starting uvicorn application server on port 8000..."
        exec uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      DEBUG: ${DEBUG:-false}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
      # NOTE:
      # - This S3_PUBLIC_ENDPOINT is intentionally configured only for the backend.
      # - All S3 access from the application (including the browser/frontend) is
      #   performed via the backend API, so the frontend does not need this variable.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      IAC_CONFIG_HASH: ${IAC_CONFIG_HASH:-}
      # BE->OpenPanel (server-side product analytics). Same non-secret per-env
      # client-id the frontend uses (injected by deploy_primitive from
      # tools/openpanel_clients.py); empty => backend analytics is a no-op.
      OPENPANEL_CLIENT_ID: ${OPENPANEL_CLIENT_ID:-}
      OPENPANEL_API_URL: https://openpanel.${INTERNAL_DOMAIN}/api
      OPENPANEL_ENVIRONMENT: ${OPENPANEL_ENVIRONMENT:-}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      start_period: ${BACKEND_HEALTHCHECK_START_PERIOD:-60s}
      interval: 10s
      retries: 3
      timeout: 5s
    volumes:
      - secrets:/secrets:ro
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finance-report-api${ENV_DOMAIN_SUFFIX}.rule=Host(`report${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.finance-report-api${ENV_DOMAIN_SUFFIX}.entrypoints=websecure"
      - "traefik.http.routers.finance-report-api${ENV_DOMAIN_SUFFIX}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.finance-report-api${ENV_DOMAIN_SUFFIX}.service=finance-report-api${ENV_DOMAIN_SUFFIX}"
      - "traefik.http.services.finance-report-api${ENV_DOMAIN_SUFFIX}.loadbalancer.server.port=8000"
      # Strip /api prefix before forwarding to backend
      - "traefik.http.middlewares.finance-report-api-strip${ENV_DOMAIN_SUFFIX}.stripprefix.prefixes=/api"
      - "traefik.http.routers.finance-report-api${ENV_DOMAIN_SUFFIX}.middlewares=finance-report-api-strip${ENV_DOMAIN_SUFFIX}@docker"

  frontend:
    image: ghcr.io/wangzitian0/finance_report-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: finance_report-frontend${ENV_SUFFIX}
    restart: always
    mem_limit: ${APP_FRONTEND_MEM_LIMIT:-768m}
    cpu_shares: ${TIER_CPU_SHARES:-1024}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Origin only — NO trailing /api. The front end already prefixes every
      # request path with /api (lib/api.ts), and Traefik strips that /api before
      # forwarding to the backend (see api-strip middleware above). A /api suffix
      # here would make the client build /api/api/... → 404 if this value is ever
      # baked into the bundle. The shipped image (ci.yml) deliberately bakes this
      # empty for same-origin; keeping the runtime value origin-only stays consistent.
      NEXT_PUBLIC_API_URL: https://report${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}
      NEXT_PUBLIC_APP_URL: https://report${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}
      # OpenPanel PV tracking (model B: one project per env). The per-env client id
      # and environment name are injected by deploy.py as plain runtime env, read
      # server-side at request time (NOT build-time NEXT_PUBLIC, so they survive
      # the promote-not-rebuild shared image). Empty client id => a complete no-op.
      OPENPANEL_CLIENT_ID: ${OPENPANEL_CLIENT_ID:-}
      # Single (prod-only) OpenPanel instance — no env suffix; envs are separated
      # by project/client id (model B), not by OpenPanel instance.
      OPENPANEL_API_URL: https://openpanel.${INTERNAL_DOMAIN}/api
      OPENPANEL_ENVIRONMENT: ${OPENPANEL_ENVIRONMENT:-}
      # OpenPanel web SDK script served by the SELF-HOSTED instance (not the
      # openpanel.dev cloud CDN) so the browser loads analytics from our own domain.
      OPENPANEL_SCRIPT_URL: https://openpanel.${INTERNAL_DOMAIN}/op1.js
      # Browser → SigNoz traces (Infra-014). The browser cannot reach the
      # Docker-internal collector, so FE OTLP goes through the ONE public ingest
      # domain otel.${INTERNAL_DOMAIN} (CORS-gated + collector memory_limiter; NO
      # bearer token — a browser can't hold a secret, see ops.observability.md §4.4)
      # → Traefik → platform-signoz-otel-collector:4318. Like
      # OPENPANEL_*, these are injected as plain runtime env read server-side at
      # request time (NOT build-time NEXT_PUBLIC baked into the shared image), so a
      # promote-not-rebuild image stays env-agnostic. deployment.environment + git
      # sha mirror the backend's OTEL_RESOURCE_ATTRIBUTES so FE/BE spans correlate.
      # #368: the endpoint is built ONCE in tools.deploy_env_config.otel_env (single
      # source: libs.common.otel_ingest_endpoint) and injected by every deploy path
      # (deploy_primitive for staging/prod, preview_lifecycle for preview). Consumed
      # here, never re-constructed — no inline otel.<domain>/v1/traces literal. Empty
      # when unset, which config-gates the FE OTel SDK to a no-op (same as OpenPanel).
      NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT: ${NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      NEXT_PUBLIC_DEPLOYMENT_ENVIRONMENT: ${ENV}
      NEXT_PUBLIC_GIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finance-report-web${ENV_DOMAIN_SUFFIX}.rule=Host(`report${ENV_DOMAIN_SUFFIX}.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.finance-report-web${ENV_DOMAIN_SUFFIX}.entrypoints=websecure"
      - "traefik.http.routers.finance-report-web${ENV_DOMAIN_SUFFIX}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.finance-report-web${ENV_DOMAIN_SUFFIX}.service=finance-report-web${ENV_DOMAIN_SUFFIX}"
      - "traefik.http.services.finance-report-web${ENV_DOMAIN_SUFFIX}.loadbalancer.server.port=3000"
      # Lower priority than API route
      - "traefik.http.routers.finance-report-web${ENV_DOMAIN_SUFFIX}.priority=1"

volumes:
  secrets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m,mode=0755"

networks:
  dokploy-network:
    external: true
