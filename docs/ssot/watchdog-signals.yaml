  # ClickHouse liveness is no longer a read-only /ping probe: it stayed green on an
  # unwritable data dir (read green / write dead). Replaced by a WRITE-PATH healthcheck
  # (op-ch & platform-clickhouse compose -> unhealthy -> Dokploy restart) plus the
  # signoz/openpanel-roundtrip signals (write+query) as the alert path.

  # Host resource backstop (out-of-band from SigNoz). Production runner only —
  # the host is shared, so it is checked once. expected = % ceiling.
  - signal_id: production.host.cpu
    environment: production
    component: host
    signal: host-cpu
    primary_owner: internal
    severity: warning
    cadence: 60s
    alert_threshold: 3 consecutive failures
    expected: "<=80% CPU"

  - signal_id: production.host.mem
    environment: production
    component: host
    signal: host-mem
    primary_owner: internal
