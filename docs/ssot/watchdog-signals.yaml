version: 2
owners:
  - internal
  - cloudflare
  - github
  - excluded
signals:
  - signal_id: production.dokploy.internal-http
    environment: production
    component: dokploy
    signal: dokploy-internal-http
    primary_owner: internal
    severity: critical
    cadence: 60s
    alert_threshold: 3 consecutive failures
    retry_count: 2
    renotify_window_sec: 3600
    failure_domain_whitelist: [host-reachability, network, resource]
    expected_sla_pct: 99.9

  - signal_id: staging.dokploy.internal-http
    environment: staging
    component: dokploy
    signal: dokploy-internal-http
    primary_owner: internal
