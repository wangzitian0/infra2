site_name: Infra Docs
site_description: Infrastructure docs, SSOT, and onboarding.
site_url: https://wangzitian0.github.io/infra2/
repo_url: https://github.com/wangzitian0/infra2
repo_name: wangzitian0/infra2

docs_dir: .
site_dir: ../.site

exclude_docs: |
  README_tempate.md
  project/project_template.md
  project/todowrite_template.md
  ssot/template.md
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: onboarding/README.md
  - 文档索引: README.md
  - Onboarding:
      - Quick Start: onboarding/01.quick-start.md
      - First App: onboarding/02.first-app.md
      - Database: onboarding/03.database.md
      - Secrets: onboarding/04.secrets.md
      - SSO: onboarding/05.sso.md
      - Observability: onboarding/06.observability.md
      - SigNoz Deployment Guide: onboarding/signoz.md
      - New Service SOP: onboarding/07.new-service-sop.md
  # SSOT nav must list every MANIFEST topic — locked by
  # libs/tests/test_mkdocs_nav_manifest.py. Add a topic here when you add it to MANIFEST.
  - SSOT:
      - Index: ssot/README.md
      - Core:
          - Architecture: ssot/core.md
          - Environments: ssot/core.environments.md
          - Workspace Harness: ssot/core.harness.md
          - TrueAlpha Runtime: ssot/core.truealpha_runtime.md
      - Bootstrap:
          - No-Dep: ssot/bootstrap.nodep.md
          - Vars & Secrets: ssot/bootstrap.vars_and_secrets.md
          - DNS & Cert: ssot/bootstrap.dns_and_cert.md
          - IaC Runner: ssot/bootstrap.iac_runner.md
      - Platform:
          - Domain: ssot/platform.domain.md
          - SSO: ssot/platform.sso.md
          - Automation: ssot/platform.automation.md
          - AI (Planned): ssot/platform.ai.md
          - OpenPanel: ssot/platform.openpanel.md
      - Data:
          - Overview: ssot/db.overview.md
          - Vault Integration: ssot/db.vault-integration.md
          - Platform PG: ssot/db.platform_pg.md
          - Redis: ssot/db.redis.md
          - ClickHouse: ssot/db.clickhouse.md
      - Ops:
          - Standards: ssot/ops.standards.md
          - Pipeline: ssot/ops.pipeline.md
          - E2E: ssot/ops.e2e-regressions.md
          - Test Coverage: ssot/ops.test_coverage.md
          - Recovery: ssot/ops.recovery.md
          - Storage: ssot/ops.storage.md
          - Backup Inventory: ssot/ops.backup-inventory.yaml
          - Deploy Dependencies: ssot/deploy-dependencies.yaml
          - Delivery Stages: ssot/delivery-stages.yaml
          - CI Gate Inventory: ssot/ci-gate-inventory.yaml
          - Observability: ssot/ops.observability.md
          - Watchdog Signals: ssot/watchdog-signals.yaml
  - Projects:
      - Infra-021: project/Infra-021.openpanel_install.md
      - Infra-020: project/Infra-020.truealpha_production_datahub.md
      - Infra-017: project/Infra-017.truealpha_dagster_capture.md
      - Infra-016: project/Infra-016.ci_gate_inventory.md
      - Infra-013: project/Infra-013.service_registry_ssot.md
      - Infra-012: project/Infra-012.watchdog_observability.md
      - Infra-010: project/Infra-010.iac_and_service_verification.md
      - Infra-009: project/Infra-009.finance_report_deploy.md
      - Infra-008: project/Infra-008.platform_multi_env.md
      - Infra-007: project/Infra-007.signoz_install.md
      - Portfolio: project/README.md
      - Infra-019: project/Infra-019.harness_control_plane.md
      - Infra-015: project/Infra-015.deploy_v2_front_door.md
      - Infra-014: project/Infra-014.finance_report_observability.md
      - Infra-011: project/Infra-011.reliability_hardening.md
      - Infra-006: project/Infra-006.documentation_engineering.md
      - Infra-005: project/Infra-005.homer_portal.md
      - Infra-004: project/Infra-004.authentik_install.md
  - Archived Projects:
      - Infra-001: project/archive/Infra-001.bootstrap_setup.md
